<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src *; script-src 'self' 'unsafe-inline' https://gc.zgo.at; connect-src 'self' https://lcjru.goatcounter.com; style-src 'unsafe-inline'; manifest-src 'self'; worker-src 'self'">
<title>Lane Cove Junior Rugby — Fixtures 2026</title>
<link rel="icon" type="image/png" sizes="192x192" href="assets/icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="assets/icon-512.png">
<link rel="apple-touch-icon" sizes="180x180" href="assets/apple-touch-icon-180.png">
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#021444">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="LCJRU">
<meta name="format-detection" content="telephone=no">
<style>
  :root {
    --navy: #021444;
    --gold: #F4C842;
    --gold-soft: #F8E08E;
    --cream: #FFF6D6;
    --cream-edge: #F0E2A8;
    --ink: #1A1A1A;
    --muted: #6B6B6B;
    --rule: #E5E5E5;
    --green: #2E7D4F;
  }
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Arial, sans-serif;
    margin: 0; background: #FAFAFA; color: var(--ink);
    -webkit-font-smoothing: antialiased;
    /* Keep content clear of the iOS home indicator when launched standalone. */
    padding-bottom: env(safe-area-inset-bottom);
  }
  .page { max-width: 900px; margin: 0 auto; background: #fff; box-shadow: 0 4px 24px rgba(0,0,0,.06); }

  /* HEADER */
  .header {
    background: var(--navy); color: #fff;
    padding: 12px 20px;
    /* Honour notch/Dynamic Island safe areas when launched in standalone mode. */
    padding-top: max(12px, env(safe-area-inset-top));
    padding-left: max(20px, env(safe-area-inset-left));
    padding-right: max(20px, env(safe-area-inset-right));
    display: flex; align-items: center;
    border-bottom: 6px solid var(--gold);
    gap: 14px;
    position: relative;
  }
  .header-left { display: flex; align-items: center; gap: 14px; min-width: 0; flex: 1 1 auto; }
  .header-home {
    position: absolute;
    right: max(20px, env(safe-area-inset-right));
    bottom: 8px;
    display: inline-flex; align-items: center; gap: 5px;
    appearance: none; cursor: pointer;
    font-family: inherit; font-size: 11px; font-weight: 700;
    color: #fff; background: rgba(255,255,255,.08);
    border: 1px solid rgba(255,255,255,.22);
    padding: 4px 11px; border-radius: 999px;
    line-height: 1; white-space: nowrap;
    transition: background .12s, border-color .12s;
  }
  .header-home[hidden] { display: none; }
  .header-home:hover { background: rgba(255,255,255,.16); border-color: rgba(255,255,255,.45); }
  .header-home:focus-visible { outline: 2px solid var(--gold); outline-offset: 2px; }
  .header-home .action-icon { font-size: 12px; line-height: 1; }
  .crest { width: 52px; height: 64px; overflow: hidden; flex-shrink: 0; box-shadow: 0 2px 6px rgba(0,0,0,.25); }
  .crest img { width: 100%; height: 100%; object-fit: cover; object-position: center; display: block; }
  .title-block { min-width: 0; }
  .eyebrow { text-transform: uppercase; letter-spacing: 2.5px; font-size: 10.5px; color: var(--gold); font-weight: 600; }
  .title-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-top: 2px; }
  .title-row h1 { font-size: clamp(22px, 5.4vw, 28px); margin: 0; font-weight: 800; letter-spacing: -.5px; line-height: 1.05; }
  .updated-stamp {
    font-size: 11px; color: #8A9BBF; font-weight: 500;
    margin-top: 2px; letter-spacing: .2px;
  }

  .live-pill {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 10px; font-weight: 700; color: #fff;
    background: rgba(255,255,255,.06);
    border: 1px solid rgba(255,255,255,.2);
    padding: 3px 9px 3px 7px; border-radius: 999px;
    letter-spacing: .6px; line-height: 1; white-space: nowrap;
    text-transform: uppercase;
    flex-shrink: 0;
  }
  .live-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: #4ADE80; flex-shrink: 0;
    box-shadow: 0 0 0 3px rgba(74,222,128,.18);
  }
  .beta-pill {
    display: inline-flex; align-items: center;
    font-size: 10px; font-weight: 800; color: var(--navy);
    background: var(--gold);
    padding: 3px 9px; border-radius: 999px;
    letter-spacing: 1px; line-height: 1; white-space: nowrap;
    text-transform: uppercase;
    flex-shrink: 0;
  }

  /* TOOLBAR — single row of teams + action bar */
  .toolbar {
    padding: 10px 20px;
    padding-left: max(20px, env(safe-area-inset-left));
    padding-right: max(20px, env(safe-area-inset-right));
    background: #FFFDF5;
    border-bottom: 1px solid var(--rule);
  }
  .token-grid {
    display: grid;
    grid-template-columns: repeat(8, minmax(0, 1fr));
    gap: 5px;
  }
  @media (min-width: 720px) {
    .token-grid { grid-template-columns: repeat(16, minmax(0, 1fr)); gap: 6px; }
  }
  .token {
    font-size: 11px; font-weight: 700;
    padding: 5px 4px; border-radius: 18px;
    border: 1.5px solid var(--cream-edge);
    background: var(--cream); color: var(--navy);
    cursor: pointer; user-select: none;
    transition: background .12s, color .12s, border-color .12s,
                opacity .25s ease, transform .25s ease;
    white-space: nowrap; line-height: 1.3; text-align: center;
    min-width: 0;
  }
  .token:hover { border-color: var(--navy); }
  .token.active { background: var(--navy); color: #fff; border-color: var(--navy); }
  .token .squad { font-weight: 800; margin-left: 2px; }
  .token .squad-g { color: #B68500; }
  .token .squad-b { color: #1E5DD4; }
  .token.active .squad-g { color: var(--gold); }
  .token.active .squad-b { color: #93C5FD; }

  /* Once a team is selected, the token grid hides entirely and a small pill
     with the team label + a down chevron appears at the top-right of the
     header (above the home button). Tapping the pill re-shows the grid so
     the user can pick another team. The View Transitions API (when
     supported) animates the active token flying from its grid cell up to
     the header pill; otherwise the swap is instant. */
  .token.active { view-transition-name: active-team-token; }
  .token-grid.collapsed { display: none; }
  /* Suppress the duplicate name when the token is hidden inside a collapsed
     grid — the header pill below claims the same name to drive the morph. */
  .token-grid.collapsed .token.active { view-transition-name: none; }

  .header-team {
    position: absolute;
    top: max(8px, env(safe-area-inset-top));
    right: max(20px, env(safe-area-inset-right));
    display: inline-flex; align-items: center; gap: 5px;
    appearance: none; cursor: pointer;
    font-family: inherit; font-size: 11px; font-weight: 700;
    color: var(--navy); background: var(--cream);
    border: 1.5px solid var(--cream-edge);
    padding: 4px 11px; border-radius: 999px;
    line-height: 1; white-space: nowrap;
    transition: background .12s, border-color .12s;
  }
  .header-team[hidden] { display: none; }
  .header-team:hover { border-color: var(--navy); background: #fff; }
  .header-team:focus-visible { outline: 2px solid var(--gold); outline-offset: 2px; }
  .header-team:not([hidden]) { view-transition-name: active-team-token; }
  .header-team-chevron {
    width: 12px; height: 12px;
    fill: none; stroke: var(--navy); stroke-width: 2.5;
    stroke-linecap: round; stroke-linejoin: round;
  }
  .header-team .squad { font-weight: 800; margin-left: 2px; }
  .header-team .squad-g { color: #B68500; }
  .header-team .squad-b { color: #1E5DD4; }

  /* INSTALL HINT — only shown when installable + not yet dismissed + not already standalone */
  .install-hint {
    display: none;
    align-items: center; gap: 10px;
    padding: 9px 14px;
    padding-left: max(14px, env(safe-area-inset-left));
    padding-right: max(14px, env(safe-area-inset-right));
    background: var(--cream); border-bottom: 1px solid var(--cream-edge);
    font-size: 12px; color: var(--navy);
  }
  .install-hint.visible { display: flex; }
  .install-hint-icon { font-size: 16px; flex-shrink: 0; }
  .install-hint-text { flex: 1 1 auto; line-height: 1.35; }
  .install-hint-text b { font-weight: 700; }
  .install-hint kbd {
    display: inline-block; padding: 0 4px; font-family: inherit; font-size: 11px;
    background: #fff; border: 1px solid var(--cream-edge); border-radius: 4px;
  }
  .install-hint-cta {
    appearance: none; border: 1.5px solid var(--navy); background: var(--navy); color: #fff;
    font-weight: 700; font-size: 12px; padding: 5px 11px; border-radius: 999px;
    cursor: pointer; flex-shrink: 0;
  }
  .install-hint-cta:hover { background: #042266; }
  .install-hint-dismiss {
    appearance: none; border: none; background: transparent; color: var(--muted);
    font-size: 18px; line-height: 1; padding: 2px 4px; cursor: pointer; flex-shrink: 0;
  }
  .install-hint-dismiss:hover { color: var(--navy); }

  /* Action bar — filter toggles + Share / Calendar.
     Single row at every width: filter-row left, button-row right. */
  .action-bar {
    display: flex; gap: 8px 12px; align-items: center;
    flex-wrap: nowrap;
    margin-top: 9px; padding-top: 9px;
    border-top: 1px dashed var(--cream-edge);
  }
  .action-bar[hidden] { display: none; }
  /* Grid hidden? Drop the dashed separator + extra spacing — the action-bar
     would otherwise appear with a stray rule above it. */
  .token-grid.collapsed + .action-bar {
    border-top: none; margin-top: 0; padding-top: 0;
  }

  .filter-row {
    display: flex; gap: 6px; align-items: center; flex-wrap: nowrap;
    flex: 1 1 auto; min-width: 0;
  }
  .button-row {
    display: flex; gap: 6px; align-items: center;
    flex: 0 0 auto;
  }

  /* Filter toggles — pill with a status dot that fills when active.
     OFF: white pill, muted text, hollow dot.
     ON:  cream pill, navy text, filled navy dot. */
  .filter-label {
    font-size: 10px; font-weight: 800; color: var(--muted);
    text-transform: uppercase; letter-spacing: 1px;
    margin-right: 2px;
  }
  .filter-toggle {
    appearance: none;
    display: inline-flex; align-items: center; gap: 6px;
    font-family: inherit; font-size: 11px; font-weight: 700;
    color: var(--muted); background: #fff;
    border: 1.5px solid var(--cream-edge);
    padding: 5px 11px 5px 9px; border-radius: 14px;
    cursor: pointer; line-height: 1; white-space: nowrap;
    transition: background .12s, border-color .12s, color .12s;
  }
  .filter-toggle::before {
    content: '';
    width: 10px; height: 10px; border-radius: 50%;
    border: 1.5px solid var(--cream-edge);
    background: transparent;
    flex-shrink: 0;
    transition: background .12s, border-color .12s, box-shadow .12s;
  }
  .filter-toggle:hover { border-color: var(--navy); color: var(--navy); }
  .filter-toggle:focus-visible { outline: 2px solid var(--navy); outline-offset: 2px; }
  .filter-toggle.active {
    background: var(--cream);
    border-color: var(--navy);
    color: var(--navy);
  }
  .filter-toggle.active::before {
    background: var(--navy);
    border-color: var(--navy);
    box-shadow: inset 0 0 0 2px #fff;
  }
  .action-btn {
    display: inline-flex; align-items: center; gap: 6px;
    font-family: inherit; font-size: 11px; font-weight: 700;
    color: var(--navy); background: var(--cream);
    border: 1.5px solid var(--cream-edge);
    padding: 6px 11px; border-radius: 20px;
    cursor: pointer; line-height: 1; white-space: nowrap;
    transition: background .12s, border-color .12s, color .12s;
  }
  .action-btn:hover { border-color: var(--navy); }
  .action-btn:focus-visible { outline: 2px solid var(--navy); outline-offset: 2px; }
  .action-btn .action-icon { font-size: 12px; line-height: 1; }
  .action-btn .action-caret { font-size: 9px; opacity: .7; margin-left: 1px; }

  .action-menu { position: relative; }
  .action-popover {
    position: absolute; top: calc(100% + 6px); right: 0; z-index: 30;
    display: none; flex-direction: column;
    background: #fff; border: 1px solid var(--rule); border-radius: 8px;
    box-shadow: 0 8px 24px rgba(0,0,0,.12);
    padding: 5px; min-width: 248px;
  }
  .action-popover.open { display: flex; }
  .cal-option {
    display: flex; align-items: flex-start; gap: 10px;
    text-align: left; text-decoration: none;
    font-family: inherit; color: var(--ink); background: transparent;
    border: none; padding: 9px 10px; border-radius: 5px;
    cursor: pointer; line-height: 1.2; width: 100%;
  }
  .cal-option:hover { background: var(--cream); color: var(--navy); }
  .cal-option-icon {
    font-size: 14px; line-height: 1.2; flex-shrink: 0;
    width: 18px; text-align: center; padding-top: 1px;
  }
  .cal-option-text { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
  .cal-option-label { font-size: 12px; font-weight: 700; }
  .cal-option-sub { font-size: 10.5px; color: var(--muted); font-weight: 500; line-height: 1.35; white-space: normal; }


  /* WELCOME SCREEN */
  .welcome {
    padding: 36px 28px 44px;
    text-align: center;
    border-bottom: 1px solid var(--rule);
  }
  .welcome h2 {
    font-size: 21px; font-weight: 800; color: var(--navy);
    margin: 0 0 6px; letter-spacing: -.3px;
  }
  .welcome-sub {
    font-size: 14px; color: var(--muted);
    margin: 0 0 24px; line-height: 1.5;
  }
  .welcome-cta {
    display: inline-block;
    background: var(--gold); color: var(--navy);
    font-size: 13px; font-weight: 800;
    padding: 10px 22px; border-radius: 24px;
    margin-bottom: 36px; letter-spacing: .2px;
  }
  .feature-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
    gap: 12px; text-align: left;
  }
  .feature-card {
    background: var(--cream);
    border: 1px solid var(--cream-edge);
    border-radius: 8px;
    padding: 16px 14px;
  }
  .feature-icon { font-size: 22px; margin-bottom: 8px; line-height: 1; }
  .feature-title {
    font-size: 11px; font-weight: 800; color: var(--navy);
    text-transform: uppercase; letter-spacing: .8px; margin-bottom: 5px;
  }
  .feature-desc { font-size: 12px; color: var(--muted); line-height: 1.55; }

  /* HOME — compact intro + at-a-glance sections */
  .home-intro {
    padding: 22px 28px 18px;
    text-align: center;
    border-bottom: 1px solid var(--rule);
  }
  .home-intro h2 {
    font-size: 19px; font-weight: 800; color: var(--navy);
    margin: 0 0 6px; letter-spacing: -.3px;
  }
  .home-intro-sub {
    font-size: 13px; color: var(--muted); line-height: 1.5;
    max-width: 580px; margin: 0 auto;
  }
  .home-cta {
    display: inline-flex; gap: 6px; align-items: center;
    margin-top: 14px;
    background: var(--cream); color: var(--navy);
    border: 1.5px solid var(--cream-edge);
    font-size: 12px; font-weight: 700;
    padding: 6px 14px; border-radius: 20px;
    letter-spacing: .2px;
  }
  .home-cta::before { content: "↑"; font-weight: 800; }
  .home-outro {
    padding: 26px 28px 32px;
    border-top: 1px solid var(--rule);
    background: #FAFAF7;
  }
  .home-outro-title {
    font-size: 11px; font-weight: 800; color: var(--navy);
    text-transform: uppercase; letter-spacing: 1.2px;
    margin: 0 0 12px; text-align: center;
  }
  .home-empty {
    padding: 18px 28px; font-size: 13px;
    color: var(--muted); font-style: italic; text-align: center;
    border-bottom: 1px solid var(--rule);
  }

  /* Compact rows used on the home page — denser than .row, single-line, link-styled */
  .home-row {
    display: flex; align-items: center; gap: 10px;
    padding: 7px 28px;
    border-bottom: 1px solid var(--rule);
    font-size: 13px; line-height: 1.3;
    color: var(--ink); text-decoration: none;
    transition: background .12s;
  }
  .home-row:hover { background: #FFFDF5; }
  .home-row:last-child { border-bottom: none; }
  .home-row.next-up { background: #FFFFF0; box-shadow: inset 3px 0 0 var(--gold); }
  .home-row-when {
    flex-shrink: 0; min-width: 76px;
    font-size: 11.5px; color: var(--muted); font-weight: 600;
    font-variant-numeric: tabular-nums; letter-spacing: .2px;
  }
  .home-row-result {
    flex-shrink: 0; min-width: 76px;
    font-size: 12px; font-weight: 700;
    font-variant-numeric: tabular-nums;
  }
  .home-row-result.win  { color: var(--green); }
  .home-row-result.loss { color: #b71c1c; }
  .home-row-result.draw { color: var(--muted); }
  .home-row-result-letter { font-weight: 800; margin-right: 4px; }
  .home-row .team-pill { flex-shrink: 0; }
  .team-pill-event {
    background: #EEF2FE; border-color: #C9D5F5; color: var(--navy);
    text-transform: uppercase; letter-spacing: .8px;
  }
  .home-row-text {
    flex: 1 1 auto; min-width: 0;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .home-row-venue { color: var(--muted); }
  .home-row-extra { flex-shrink: 0; display: flex; gap: 5px; align-items: center; }
  .home-row-extra .home-pill,
  .home-row-extra .derby-pill,
  .home-row-extra .status-badge { margin: 0; }

  /* SECTION HEADER */
  .section-header {
    padding: 7px 28px;
    background: #FFFDF5;
    border-top: 4px solid var(--gold);
    border-bottom: 1px solid var(--rule);
    text-transform: uppercase; letter-spacing: 2px;
    font-size: 10px; font-weight: 700; color: var(--navy);
    display: flex; justify-content: space-between; align-items: baseline; gap: 12px;
  }
  .section-header .section-meta {
    font-size: 10px; font-weight: 600; letter-spacing: 1.2px;
    color: var(--muted); text-transform: none;
  }

  /* ROW */
  .row {
    display: flex; align-items: center; gap: 14px;
    padding: 10px 28px; min-height: 78px;
    border-bottom: 1px solid var(--rule);
    scroll-margin-top: 8px;
    position: relative;
  }
  .row:last-child { border-bottom: none; }
  .row.next-up { background: #FFFFF0; }

  /* Anchor link on each row — desktop hover only; hidden from touch/tap flow */
  .row-anchor {
    position: absolute; left: 8px; top: 50%; transform: translateY(-50%);
    font-size: 11px; color: #ccc; text-decoration: none;
    opacity: 0; pointer-events: none; transition: opacity .15s;
    line-height: 1;
  }
  @media (hover: hover) {
    .row:hover .row-anchor { opacity: 1; pointer-events: auto; }
    .row-anchor:hover { color: var(--navy); }
  }
  .row-anchor:focus-visible { opacity: 1; pointer-events: auto; color: var(--navy); }
  .row-anchor.row-anchor-copied { opacity: 1; color: var(--green); font-weight: 700; }

  /* BADGE */
  .rnd-badge {
    width: 50px; height: 50px; border-radius: 50%;
    background: var(--navy); color: #fff;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    flex-shrink: 0; font-size: 8px; text-transform: uppercase; letter-spacing: 1.5px; line-height: 1;
  }
  .rnd-badge .num { font-size: 18px; font-weight: 800; margin-top: 2px; letter-spacing: 0; }
  .rnd-badge.final { background: var(--gold); color: var(--navy); }
  .rnd-badge.result { background: #2e5a1e; }
  .rnd-badge.past { background: #9E9E9E; }
  .rnd-badge.gala { background: #6A1B9A; color: #fff; }
  .rnd-badge.gala.past { background: #9E9E9E; }

  /* DATE/TIME BLOCK */
  .date-block { flex-shrink: 0; width: 74px; line-height: 1.25; }
  .date-block .dow { text-transform: uppercase; letter-spacing: 1.5px; font-size: 10px; color: var(--muted); }
  .date-block .date { font-size: 17px; font-weight: 700; color: var(--ink); }
  .date-block .time { font-size: 11px; font-weight: 600; color: var(--navy); margin-top: 1px; }
  .date-block .note { font-size: 9px; color: #C2185B; text-transform: uppercase; letter-spacing: 1px; font-weight: 700; margin-top: 2px; }
  .date-block .note.final { color: var(--navy); }

  /* VENUES */
  .venues { flex: 1; display: flex; flex-direction: column; gap: 4px; min-width: 0; }
  .venue { display: flex; align-items: center; gap: 7px; font-size: 13px; min-width: 0; overflow: hidden; }
  .team-pill {
    background: var(--cream); border: 1px solid var(--cream-edge);
    color: var(--navy); font-weight: 700; font-size: 10px;
    padding: 2px 8px; border-radius: 3px; letter-spacing: .5px;
    flex-shrink: 0; white-space: nowrap;
  }
  .venue-link {
    color: var(--ink); text-decoration: none;
    display: inline-flex; align-items: center; gap: 3px;
    flex: 0 1 auto; min-width: 0; overflow: hidden;
  }
  .venue-link span {
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    text-decoration: underline; text-decoration-style: dotted; text-decoration-color: #bbb;
  }
  .venue-link:hover { color: var(--navy); }
  .venue-link:hover span { text-decoration-color: var(--navy); }

<script type="module">
import { esc, isLaneCove, shortTeamName, fmtDow, fmtDate, fmtTime, rowId, scoreClass, parseVenue, venueSlug, renderVenueDetails, renderEventDetails } from './render.mjs';

const FIXTURES_URL = './fixtures.json';

const { TEAM_SLUGS, VENUES, FINAL_ROUND } = window.LCJRU_CONFIG;
const SLUG_BY_ID = Object.fromEntries(Object.entries(TEAM_SLUGS).map(([s,id]) => [id,s]));

let currentTeam  = null;
let fixturesData = null;
let lineupsData  = null;
let eventsData   = null;

// Per-team filters: which row kinds to show. Persisted to localStorage so the user's choice
// survives reload. Notes always render — they're contextual (school holidays etc.).
const FILTER_KEY = 'lcjru-filters';
const DEFAULT_FILTERS = { rnds: true, galas: true, events: true };
let activeFilters = { ...DEFAULT_FILTERS };
try {
  const saved = JSON.parse(localStorage.getItem(FILTER_KEY) ?? 'null');
  if (saved && typeof saved === 'object') activeFilters = { ...DEFAULT_FILTERS, ...saved };
} catch { /* private mode / corrupt — fall back to defaults */ }

// Last-selected team, persisted across reloads so a user landing on the
// bare URL goes straight back to their team. URL hash still wins on initial
// load — explicit deep links override the stored preference.
const TEAM_KEY = 'lcjru-team';
function loadSavedTeam() {
  try {
    const id = localStorage.getItem(TEAM_KEY);
    return id && SLUG_BY_ID[id] ? id : null;
  } catch { return null; }
}
function saveTeam(teamId) {
  try {
    if (teamId) localStorage.setItem(TEAM_KEY, teamId);
    else localStorage.removeItem(TEAM_KEY);
  } catch { /* private mode */ }
}

const CHEVRON_SVG = '<svg viewBox="0 0 24 24" aria-hidden="true"><polyline points="6 9 12 15 18 9"/></svg>';
const CAL_SVG     = '<svg class="event-icon" viewBox="0 0 24 24" aria-hidden="true"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>';
const CAL_PLUS_SVG = '<svg viewBox="0 0 24 24" aria-hidden="true"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/><line x1="12" y1="14" x2="12" y2="18"/><line x1="10" y1="16" x2="14" y2="16"/></svg>';

// Game-variant events (round/friendly/gala) belong in the team's subscription
// feed; everything else (Mother's Day, Waratahs, holidays, presentation day)
// gets a per-event .ics download so multi-team subscribers don't see duplicates.
function isGameEvent(event) {
  return event?.variant === 'round'
      || event?.variant === 'friendly'
      || event?.variant === 'gala';
}

// Returns [Sat 00:00, Mon 00:00) for the weekend offset relative to now.
// offset 0 = current/upcoming weekend (Sun is treated as part of the current weekend);
// offset -1 = the previous weekend.
function weekendRange(now, offset = 0) {
  const d = new Date(now);
  const dow = d.getDay(); // 0=Sun, 6=Sat
  const daysToSat = dow === 0 ? -1 : (dow === 6 ? 0 : 6 - dow);
  const sat = new Date(d.getFullYear(), d.getMonth(), d.getDate() + daysToSat + offset * 7);
  sat.setHours(0, 0, 0, 0);
  const monAfter = new Date(sat);
  monAfter.setDate(sat.getDate() + 2);
  return [sat, monAfter];
}

function fmtWeekendLabel(sat) {
  const sun = new Date(sat); sun.setDate(sat.getDate() + 1);
  const f = (d, opts) => d.toLocaleDateString('en-AU', { ...opts, timeZone: 'Australia/Sydney' });
  if (sat.getMonth() === sun.getMonth()) {
    return `${f(sat, { weekday: 'short' })} ${sat.getDate()} – ${f(sun, { weekday: 'short' })} ${f(sun, { day: 'numeric', month: 'short' })}`;
  }
  return `${f(sat, { weekday: 'short', day: 'numeric', month: 'short' })} – ${f(sun, { weekday: 'short', day: 'numeric', month: 'short' })}`;
}

function sectionHeader(title, meta = '') {
  const metaHtml = meta ? `<span class="section-meta">${esc(meta)}</span>` : '';
  return `<div class="section-header"><span>${esc(title)}</span>${metaHtml}</div>`;
}

// Renders one match as a compact, single-line home-page row. Each row is a deep link to
// the LC team's full schedule, with the match expanded.
function renderHomeMatchRow(match, { isNextUp = false, mode = 'fixture' } = {}) {
  const lcTeam   = isLaneCove(match.home) ? match.home : match.away;
  const opponent = isLaneCove(match.home) ? match.away : match.home;
  const isHome   = (match.venue || '').toLowerCase().includes('tantallon');
  const isDerby  = isLaneCove(match.home) && isLaneCove(match.away);
  const slug     = SLUG_BY_ID[lcTeam.id];
  const href     = slug ? `#${slug}/${rowId(match)}` : '#';
  const { display: loc } = parseVenue(match.venue ?? '', VENUES);

  // Left column: result+score for completed games, day+time for upcoming
  let leftCol;
  if (mode === 'result') {
    const sc = scoreClass(match);
    const letter = { win: 'W', loss: 'L', draw: 'D' }[sc] || '·';
    leftCol = `<span class="home-row-result ${sc}"><span class="home-row-result-letter">${letter}</span>${esc(match.home.score)}–${esc(match.away.score)}</span>`;
  } else {
    const dow = fmtDow(match.dateTime);
    const time = fmtTime(match.dateTime);
    const showTime = time !== '12:00am';
    leftCol = `<span class="home-row-when">${esc(dow)}${showTime ? ' ' + esc(time) : ''}</span>`;
  }

  const badges = [];
  if (isHome)  badges.push('<span class="home-pill">Home</span>');
  if (isDerby) badges.push('<span class="derby-pill">Derby</span>');

  const classes = ['home-row'];
  if (isNextUp) classes.push('next-up');

  return `<a class="${classes.join(' ')}" href="${esc(href)}">
    ${leftCol}
    <span class="team-pill">${esc(shortTeamName(lcTeam.name))}</span>
    <span class="home-row-text">v ${esc(opponent.name)}${loc ? ' <span class="home-row-venue">· ' + esc(loc) + '</span>' : ''}</span>
    <span class="home-row-extra">${badges.join('')}</span>
  </a>`;
}

// Renders an event as a compact home-page row. Deep-links to the first applicable team's
// view (events tagged with '*' fall back to u10 so the panel can open).
function renderHomeEventRow(event) {
  const dt = eventDt(event);
  const dowDate = dt ? `${fmtDow(dt.toISOString())} ${fmtDate(dt.toISOString())}` : '';
  const tail = [event.venue, event.description].filter(Boolean).map(esc).join(' · ');

  const STATUS_LABELS = { tentative: 'TBC', cancelled: 'Cancelled' };
  const statusBadge = STATUS_LABELS[event.status]
    ? `<span class="status-badge status-${esc(event.status)}">${STATUS_LABELS[event.status]}</span>` : '';

  let slug = '';
  if (event.teams?.length) {
    slug = event.teams.includes('*') ? 'u10' : event.teams[0];
  }
  const href = slug ? `#${slug}/event-${event.id}` : '#';

  const pillLabel = event.galaLabel || (event.variant === 'gala' ? 'Gala' : 'Event');

  return `<a class="home-row" href="${esc(href)}">
    <span class="home-row-when">${esc(dowDate)}</span>
    <span class="team-pill team-pill-event">${esc(pillLabel)}</span>
    <span class="home-row-text">${esc(event.title)}${tail ? ' <span class="home-row-venue">· ' + tail + '</span>' : ''}</span>
    <span class="home-row-extra">${statusBadge}</span>
  </a>`;
}

// Walks back week by week from `now` until we find a weekend with at least one scored
// match. Cap stops the loop early in pre-season / extended breaks. Returns null if
// nothing scored in the window.
function findLastResultsWeekend(now, allMatches, maxWeeks = 6) {
  for (let i = -1; i >= -maxWeeks; i--) {
    const [s, e] = weekendRange(now, i);
    const matches = allMatches.filter(m => {
      const dt = new Date(m.dateTime);
      return dt >= s && dt < e && m.home.score !== null && m.away.score !== null;
    }).sort((a, b) => new Date(a.dateTime) - new Date(b.dateTime));
    if (matches.length > 0) return { sat: s, end: e, matches };
  }
  return null;
}

function renderHomePage() {
  const now = new Date();
  const [thisSat, thisEnd] = weekendRange(now, 0);

  const allMatches = fixturesData?.matches ?? [];
  const allEvents  = eventsData ?? [];
  const matchInRange = (m, [s, e]) => {
    const dt = new Date(m.dateTime);
    return dt >= s && dt < e;
  };
  const eventInRange = (ev, [s, e]) => {
    const dt = eventDt(ev);
    return dt && dt >= s && dt < e;
  };

  // This weekend: real fixtures + special events (skip "round" placeholders + notes)
  const thisWeekend = [
    ...allMatches.filter(m => matchInRange(m, [thisSat, thisEnd]))
      .map(m => ({ kind: 'match', dt: new Date(m.dateTime), item: m })),
    ...allEvents.filter(e =>
      e.type === 'event' && e.variant !== 'round' &&
      e.status !== 'cancelled' && eventInRange(e, [thisSat, thisEnd])
    ).map(e => ({ kind: 'event', dt: eventDt(e), item: e })),
  ].sort((a, b) => a.dt - b.dt);

  // Last results weekend: walk back until we find a weekend with scored games. Skips
  // school-holiday / bye weekends so the section doesn't render empty.
  const lastResults = findLastResultsWeekend(now, allMatches);

  // Coming up: special events after this weekend, ~12 week horizon
  const horizon = new Date(thisEnd); horizon.setDate(thisEnd.getDate() + 84);
  const upcomingEvents = allEvents
    .filter(e =>
      e.type === 'event' && e.variant !== 'round' &&
      e.status !== 'cancelled' && e.status !== 'completed' &&
      eventInRange(e, [thisEnd, horizon])
    )
    .sort((a, b) => eventDt(a) - eventDt(b))
    .slice(0, 8);

  const teamCount = Object.keys(TEAM_SLUGS).length;

  let html = `
    <div class="home-intro">
      <h2>Lane Cove Junior Rugby — what's on</h2>
      <p class="home-intro-sub">This weekend's games, last results and club events for all ${teamCount} LCJRU teams. Tantallon Oval is our home ground — most weekends we travel across Sydney for the SJRU draw.</p>
      <div class="home-cta">Pick a team above for the full schedule, calendar sync &amp; team sheets</div>
    </div>`;

  // This weekend
  html += sectionHeader('This weekend', fmtWeekendLabel(thisSat));
  if (thisWeekend.length === 0) {
    html += `<div class="home-empty">No games scheduled this weekend.</div>`;
  } else {
    let markedNext = false;
    for (const { kind, item } of thisWeekend) {
      if (kind === 'match') {
        const isNextUp = !markedNext && new Date(item.dateTime) >= now;
        if (isNextUp) markedNext = true;
        html += renderHomeMatchRow(item, { isNextUp, mode: 'fixture' });
      } else {
        html += renderHomeEventRow(item);
      }
    }
  }

  // Last weekend's results — only games with scores (Minis aren't scored). Walk-back
  // means the section can show e.g. "Sat 19 – Sun 20 Apr" when the last weekend was a
  // school-holiday bye.
  if (lastResults) {
    html += sectionHeader("Last weekend's results", fmtWeekendLabel(lastResults.sat));
    for (const m of lastResults.matches) html += renderHomeMatchRow(m, { mode: 'result' });
  }

  // Coming up
  if (upcomingEvents.length > 0) {
    html += sectionHeader('Coming up', 'Galas, club events & trips');
    for (const e of upcomingEvents) html += renderHomeEventRow(e);
  }

  html += `
    <div class="home-outro">
      <p class="home-outro-title">How to use this page</p>
      <div class="feature-grid">
        <div class="feature-card">
          <div class="feature-icon">👆</div>
          <div class="feature-title">Pick a team</div>
          <div class="feature-desc">Tap a team above for their full season — fixtures, results, venues and team sheets in one view.</div>
        </div>
        <div class="feature-card">
          <div class="feature-icon">📅</div>
          <div class="feature-title">Sync the calendar</div>
          <div class="feature-desc">Subscribe your team's draw to Apple, Google or Outlook — it auto-updates whenever the draw changes.</div>
        </div>
        <div class="feature-card">
          <div class="feature-icon">👥</div>
          <div class="feature-title">Open a team sheet</div>
          <div class="feature-desc">Tap any fixture for the lineup, coaches and appointed referee, posted in the days before kick-off.</div>
        </div>
        <div class="feature-card">
          <div class="feature-icon">🔗</div>
          <div class="feature-title">Share with parents</div>
          <div class="feature-desc">Every team has its own deep link — drop it in WhatsApp and families land straight on their fixtures.</div>
        </div>
      </div>
    </div>`;

  return html;
}

// ── lineups ───────────────────────────────────────────────────────────────────

function renderLineupPanel(matchId, entry, homeName, awaName, homeCrest, awayCrest) {
  const xplorerUrl = `https://xplorer.rugby/lcjru-/match-centre/${matchId}?tab=Player-Lineup`;

  const pad = (arr, len) => [...arr, ...Array(Math.max(0, len - arr.length)).fill(null)];

  const homeStarters = (entry.home ?? []).filter(p => !p.isSub);
  const awayStarters = (entry.away ?? []).filter(p => !p.isSub);
  const homeSubs     = (entry.home ?? []).filter(p =>  p.isSub);
  const awaySubs     = (entry.away ?? []).filter(p =>  p.isSub);
  const homeCoaches  = entry.homeCoaches ?? [];
  const awayCoaches  = entry.awayCoaches ?? [];

  const playerCell = (p, noneLabel) => {
    if (!p) return noneLabel
      ? `<div class="lineup-player"><span class="lineup-none">${noneLabel}</span></div>`
      : `<div class="lineup-player lineup-empty" aria-hidden="true"></div>`;
    const cap = p.captain ? ' <span class="lineup-captain">C</span>' : '';
    return `<div class="lineup-player"><span class="lineup-num">${esc(String(p.number))}</span><span>${esc(p.name)}${cap}</span></div>`;
  };

  const coachCell = c => c
    ? `<div class="lineup-coach">${esc(c.name)}</div>`
    : `<div class="lineup-coach lineup-empty" aria-hidden="true"></div>`;

  const sectionHead = label => `<div class="lineup-section-head">${label}</div>`;

  let html = '';
  const hdr = (name, crest) => {
    const img = crest ? `<img class="lineup-crest" src="${esc(crest)}" alt="" loading="lazy">` : '';
    return `<div class="lineup-col-header"><h4>${img}${esc(name)}</h4></div>`;
  };
  html += hdr(homeName, homeCrest) + hdr(awaName, awayCrest);

  const homeEmpty = entry.home.length === 0;
  const awayEmpty = entry.away.length === 0;
  const maxStart  = Math.max(homeStarters.length, awayStarters.length, homeEmpty || awayEmpty ? 1 : 0);
  const hStart = pad(homeStarters, maxStart);
  const aStart = pad(awayStarters, maxStart);
  for (let i = 0; i < maxStart; i++) {
    html += playerCell(hStart[i], homeEmpty && i === 0 ? 'Not published' : null);
    html += playerCell(aStart[i], awayEmpty && i === 0 ? 'Not published' : null);
  }

  const maxSubs = Math.max(homeSubs.length, awaySubs.length);
  if (maxSubs > 0) {
    html += sectionHead('Reserves');
    const hSubs = pad(homeSubs, maxSubs);
    const aSubs = pad(awaySubs, maxSubs);
    for (let i = 0; i < maxSubs; i++) {
      html += playerCell(hSubs[i], null) + playerCell(aSubs[i], null);
    }
  }

  const maxCoaches = Math.max(homeCoaches.length, awayCoaches.length);
  if (maxCoaches > 0) {
    html += sectionHead('Coaches');
    const hC = pad(homeCoaches, maxCoaches);
    const aC = pad(awayCoaches, maxCoaches);
    for (let i = 0; i < maxCoaches; i++) {
      html += coachCell(hC[i]) + coachCell(aC[i]);
    }
  }

  const officials = entry.officials ?? [];
  const mainRef   = officials.find(o => o.role === 'Referee');
  const otherRefs = officials.filter(o => o.role !== 'Referee');
  let refereeHtml = '';
  if (mainRef) {
    refereeHtml = `<span class="lineup-referee">Referee: <strong>${esc(mainRef.name)}</strong>`;
    if (otherRefs.length)
      refereeHtml += ` &nbsp;·&nbsp; ${otherRefs.map(r => `${esc(r.role)}: <strong>${esc(r.name)}</strong>`).join(' &nbsp;·&nbsp; ')}`;
    refereeHtml += `</span>`;
  }

  html += `<div class="lineup-footer">${refereeHtml}<a href="${xplorerUrl}" target="_blank" rel="noopener">View on Rugby Xplorer ↗</a></div>`;
  return html;
}

const VENUE_ASSET_PREFIX = '';

// Builds the URL hash for a row's # anchor: '<team-slug>/<row-id>' so deep links keep the
// team selected. Falls back to bare row-id if no team is active (welcome screen).
function rowHash(rowId) {
  const slug = currentTeam ? SLUG_BY_ID[currentTeam] : '';
  return slug ? `${slug}/${rowId}` : rowId;
}

function collapseAll() {
  document.querySelectorAll('.lineup-panel.open, .venue-panel.open, .panel-tabs.open').forEach(p => p.classList.remove('open'));
  document.querySelectorAll('.row.expanded').forEach(r => r.classList.remove('expanded'));
}

// Closes any open row, then opens the panels for `row`. Single-open invariant per page.
// When a row has both a lineup and venue details, only the active tab's panel is shown
// (default 'lineup'); a tab strip lets the user flip between them.
function expandRow(row) {
  collapseAll();
  const matchId = row.dataset.matchId;
  const lineupPanel = document.getElementById(`lineup-${matchId}`);
  const venuePanel  = document.getElementById(`venue-${matchId}`);
  const tabsBar     = document.getElementById(`tabs-${matchId}`);
  const hasLineup = row.classList.contains('has-lineup');
  const hasVenue  = row.classList.contains('has-venue-details');

  // Populate panel content (always — cheap, and lineupsData may have arrived since last open)
  if (venuePanel && hasVenue) {
    const eventId = row.dataset.eventId;
    const event = eventId ? eventsData?.find(e => e.id === eventId) : null;
    const eventHtml = event ? renderEventDetails(event) : '';
    const venueHtml = row.dataset.venueBase
      ? renderVenueDetails(row.dataset.venueBase, VENUES, { assetPrefix: VENUE_ASSET_PREFIX })
      : '';
    venuePanel.innerHTML = eventHtml + venueHtml;
  }
  if (lineupPanel && hasLineup) {
    const entry = lineupsData?.[matchId];
    lineupPanel.innerHTML = renderLineupPanel(
      matchId, entry,
      row.dataset.homeName  ?? '', row.dataset.awayName  ?? '',
      row.dataset.homeCrest ?? '', row.dataset.awayCrest ?? '',
    );
  }

  // Reveal the right panels
  if (hasLineup && hasVenue) {
    const activeTab = row.dataset.activeTab || 'lineup';
    setActiveTab(tabsBar, activeTab);
    tabsBar?.classList.add('open');
    (activeTab === 'lineup' ? lineupPanel : venuePanel)?.classList.add('open');
  } else if (hasLineup) {
    lineupPanel?.classList.add('open');
  } else if (hasVenue) {
    venuePanel?.classList.add('open');
  }
  row.classList.add('expanded');

  // Bring the row + open panel into view (works for click expand and deep-link arrival).
  // requestAnimationFrame waits for layout so the smooth scroll lands on the post-open height.
  requestAnimationFrame(() => row.scrollIntoView({ behavior: 'smooth', block: 'start' }));
}

function setActiveTab(tabsBar, tabName) {
  if (!tabsBar) return;
  tabsBar.querySelectorAll('.panel-tab').forEach(b => {
    b.classList.toggle('active', b.dataset.tab === tabName);
  });
}

function switchTab(row, tabName) {
  const matchId = row.dataset.matchId;
  const tabsBar     = document.getElementById(`tabs-${matchId}`);
  const lineupPanel = document.getElementById(`lineup-${matchId}`);
  const venuePanel  = document.getElementById(`venue-${matchId}`);
  row.dataset.activeTab = tabName;
  setActiveTab(tabsBar, tabName);
  lineupPanel?.classList.toggle('open', tabName === 'lineup');
  venuePanel?.classList.toggle('open', tabName === 'venue');
}

function attachExpandHandlers() {
  document.querySelectorAll('.row.has-lineup, .row.has-venue-details').forEach(row => {
    row.addEventListener('click', e => {
      if (e.target.closest('a')) return;
      if (row.classList.contains('expanded')) {
        collapseAll();
        const slug = currentTeam ? SLUG_BY_ID[currentTeam] : '';
        history.replaceState(null, '', slug ? '#' + slug : location.pathname + location.search);
      } else {
        expandRow(row);
        trackRowExpand(row);
        // Reflect the open state in the URL so refresh / share preserves it.
        history.replaceState(null, '', '#' + rowHash(row.id));
      }
    });
  });
}

// ── events ────────────────────────────────────────────────────────────────────

function eventDt(e) {
  return e.date
    ? new Date(e.time ? `${e.date}T${e.time}:00+10:00` : `${e.date}T12:00:00+10:00`)
    : null;
}

function renderEvent(event) {
  const dt     = eventDt(event);
  const isPast = event.status === 'completed' || event.status === 'cancelled' ||
    (dt && dt < new Date());

  // Only show tentative / cancelled badges; confirmed and completed are implied by context.
  const STATUS_LABELS = { tentative: 'TBC', cancelled: 'Cancelled' };
  const badgeHtml = STATUS_LABELS[event.status]
    ? `<span class="status-badge status-${esc(event.status)}">${STATUS_LABELS[event.status]}</span>`
    : '';

  // Round-variant events render with the same RND badge as real Xplorer matches (greyed out).
  // Gala-variant events use a distinct purple circle to set them apart from regular rounds.
  // Otherwise: optional iconUrl swaps the calendar SVG for a logo (e.g. Waratahs match-up).
  const isRound = event.variant === 'round' && event.xplorerRound;
  const isGala  = event.variant === 'gala';
  let badgeEl;
  if (isGala) {
    const galaLabel = event.galaLabel ?? 'GALA';
    const galaNum   = event.galaNum   ?? '★';
    badgeEl = `<div class="rnd-badge gala${isPast ? ' past' : ''}"><span>${esc(galaLabel)}</span><span class="num">${esc(galaNum)}</span></div>`;
  } else if (isRound) {
    const roundNum = event.xplorerRound.replace('Round ', '');
    badgeEl = `<div class="rnd-badge past"><span>RND</span><span class="num">${esc(roundNum)}</span></div>`;
  } else if (event.iconUrl) {
    badgeEl = `<div class="event-badge"><img class="event-badge-img" src="${esc(event.iconUrl)}" alt="" loading="lazy"></div>`;
  } else {
    badgeEl = `<div class="event-badge">${CAL_SVG}</div>`;
  }

  let venueHtml = '';
  let venueBase = null, venueHasDetails = false;
  if (event.venue) {
    const parsed = parseVenue(event.venue, VENUES);
    venueBase = parsed.base;
    venueHasDetails = parsed.hasDetails;
    const homePill = event.home ? '<span class="home-pill">Home</span>' : '';
    venueHtml = `<div class="venue"><a class="venue-link" href="${esc(parsed.mapsUrl)}" target="_blank" rel="noopener">${PIN_SVG}<span>${esc(parsed.display)}</span></a>${homePill}</div>`;
  }

  const eventHasDetails = !!event.details;
  const hasDetails = eventHasDetails || venueHasDetails;

  // Inline cta only renders when we DON'T have an expanded panel (panel CTA wins).
  const ctaHtml = event.cta && !eventHasDetails
    ? `<a href="${esc(event.cta.url ?? '#')}" class="event-cta" target="_blank" rel="noopener">${esc(event.cta.label)}</a>`
    : '';

  // Special events (not rounds/friendlies/galas) ship as per-event .ics
  // downloads so users add only the ones they care about. Games come through
  // the team feed instead.
  const isSpecialEvent = event.type === 'event' && !isGameEvent(event);
  const calLinkHtml = isSpecialEvent && !isPast
    ? `<a class="event-cal-link" href="./events/${esc(event.id)}.ics" download>${CAL_PLUS_SVG}<span>Add to calendar</span></a>`
    : '';

  const description = event.description ?? event.note ?? '';

  const anchor = `event-${event.id}`;
  const rowDataId = `event-${event.id}`;
  const detailsAttrs = hasDetails
    ? ` has-venue-details" data-venue-base="${esc(venueBase ?? '')}" data-event-id="${esc(event.id)}`
    : ``;

  return `
    <div class="row event-row${isPast ? ' event-past' : ''}${detailsAttrs}" id="${esc(anchor)}" data-match-id="${esc(rowDataId)}">
      <a class="row-anchor" href="#${esc(rowHash(anchor))}" title="Copy link">#</a>
      ${badgeEl}
      <div class="date-block">
        ${dt ? `<div class="dow">${fmtDow(dt.toISOString())}</div><div class="date">${fmtDate(dt.toISOString())}</div>${event.time ? `<div class="time">${esc(event.time)}</div>` : ''}` : ''}
      </div>
      <div class="venues">
        <div class="venue"><span class="event-title">${esc(event.title)}</span>${badgeHtml}</div>
        ${venueHtml}
        ${description ? `<div class="venue"><span class="event-note">${esc(description)}</span></div>` : ''}
        ${ctaHtml}
        ${calLinkHtml}
      </div>
      ${hasDetails ? `<span class="lineup-toggle" aria-label="Expand row">${CHEVRON_SVG}</span>` : ''}
    </div>`;
}

function renderNote(event) {
  const dt = eventDt(event);
  const isoStr = dt ? dt.toISOString() : '';
  const datePrefix = isoStr ? `<strong>${fmtDow(isoStr)} ${fmtDate(isoStr)}</strong>` : '';
  const title = event.title ?? event.text ?? '';
  const description = event.description ?? '';
  const noteHtml = [datePrefix, esc(title), description ? esc(description) : '']
    .filter(Boolean)
    .join(' · ');
  return `
    <div class="row note-row">
      <p class="note-text">${noteHtml}</p>
    </div>`;
}

// ── rendering ─────────────────────────────────────────────────────────────────

function renderMatch(match, isNextUp) {
  const isDerby       = isLaneCove(match.home) && isLaneCove(match.away);
  const lcTeam        = isLaneCove(match.home) ? match.home : match.away;
  const opponent      = isLaneCove(match.home) ? match.away : match.home;
  const isHome        = match.venue.toLowerCase().includes('tantallon');
  const isResult      = match.type === 'result';
  const isPastFixture = !isResult && new Date(match.dateTime) < new Date();
  const isFinal       = match.round?.includes(String(FINAL_ROUND));

  const roundNum = (match.round || '').replace('Round ', '');
  const badgeCls = isResult      ? 'rnd-badge result'
                 : isPastFixture ? 'rnd-badge past'
                 : isFinal       ? 'rnd-badge final'
                 :                 'rnd-badge';
  const badgeLabel = 'RND';

  const sc = scoreClass(match);
  const resultLabel = { win: 'Win', loss: 'Loss', draw: 'Draw' }[sc] || '';
  const scoreHtml = isResult && match.home.score !== null
    ? `<span class="score-pill ${sc}">${esc(match.home.score)} – ${esc(match.away.score)}</span>${resultLabel ? `<span class="result-badge ${sc}">${resultLabel}</span>` : ''}`
    : '';

  const timeStr = fmtTime(match.dateTime);
  const showTime = timeStr !== '12:00am';

  const { display: loc, pitch, mapsUrl, base: venueBase, hasDetails } = parseVenue(match.venue ?? '', VENUES);
  const anchor = rowId(match);

  const entry     = lineupsData?.[match.id];
  const hasLineup = !match.isBye && entry && (entry.home.length > 0 || entry.away.length > 0);
  const expandable = hasLineup || hasDetails;

  const classes = ['row'];
  if (isNextUp)    classes.push('next-up');
  if (hasLineup)   classes.push('has-lineup');
  if (hasDetails)  classes.push('has-venue-details');

  const attrs = [`id="${esc(anchor)}"`, `data-match-id="${esc(match.id)}"`];
  if (hasLineup) {
    attrs.push(`data-home-name="${esc(match.home.name)}"`);
    attrs.push(`data-away-name="${esc(match.away.name)}"`);
    attrs.push(`data-home-crest="${esc(match.home.crest)}"`);
    attrs.push(`data-away-crest="${esc(match.away.crest)}"`);
  }
  if (hasDetails) {
    attrs.push(`data-venue-base="${esc(venueBase)}"`);
  }

  return `
    <div class="${classes.join(' ')}" ${attrs.join(' ')}>
      <a class="row-anchor" href="#${esc(rowHash(anchor))}" title="Copy link">#</a>
      <div class="${badgeCls}">
        <span>${badgeLabel}</span>
        <span class="num">${esc(roundNum) || '?'}</span>
      </div>
      <div class="date-block">
        <div class="dow">${fmtDow(match.dateTime)}</div>
        <div class="date">${fmtDate(match.dateTime)}</div>
        ${showTime ? `<div class="time">${timeStr}</div>` : ''}
        ${isFinal && !isResult ? '<div class="note final">Final Rnd</div>' : ''}
      </div>
      <div class="venues">
        <div class="venue">
          <span class="team-pill">${esc(shortTeamName(lcTeam.name))}</span>
          <a class="venue-link" href="${mapsUrl}" target="_blank" rel="noopener">${PIN_SVG}<span>${esc(loc)}</span></a>
          ${pitch ? `<span class="pitch-on">on <span class="pitch-tag">${esc(pitch)}</span></span>` : ''}
          ${isHome ? '<span class="home-pill">Home</span>' : ''}
          ${isDerby ? '<span class="derby-pill">Local Derby</span>' : ''}
        </div>
        <div class="venue">
          <span class="opponent">vs ${esc(opponent.name)}</span>
          ${scoreHtml}
        </div>
      </div>
      ${expandable ? `<span class="lineup-toggle" aria-label="Expand row">${CHEVRON_SVG}</span>` : ''}
    </div>`;
}

function injectPanelsAndHandlers() {
  // Inject panels in reverse desired order (afterend always inserts directly after the row,
  // so the latest insertion ends up first). Final DOM: row → tabs? → lineup? → venue?.
  document.querySelectorAll('.row.has-lineup, .row.has-venue-details').forEach(row => {
    const hasLineup = row.classList.contains('has-lineup');
    const hasVenue  = row.classList.contains('has-venue-details');
    if (hasVenue) {
      const venuePanel = document.createElement('div');
      venuePanel.className = 'venue-panel';
      venuePanel.id = `venue-${row.dataset.matchId}`;
      row.insertAdjacentElement('afterend', venuePanel);
    }
    if (hasLineup) {
      const lineupPanel = document.createElement('div');
      lineupPanel.className = 'lineup-panel';
      lineupPanel.id = `lineup-${row.dataset.matchId}`;
      row.insertAdjacentElement('afterend', lineupPanel);
    }
    if (hasLineup && hasVenue) {
      const tabs = document.createElement('div');
      tabs.className = 'panel-tabs';
      tabs.id = `tabs-${row.dataset.matchId}`;
      tabs.innerHTML =
        '<button class="panel-tab active" data-tab="lineup" type="button">Lineup</button>' +
        '<button class="panel-tab" data-tab="venue" type="button">Venue</button>';
      row.insertAdjacentElement('afterend', tabs);
    }
  });
  attachExpandHandlers();
}

function render(data, teamId) {
  if (!teamId) {
    document.getElementById('calendar').innerHTML = renderHomePage();
    return;
  }

  const slug = SLUG_BY_ID[teamId];
  const now  = new Date();
  const allTeamMatches = data.matches.filter(m => m.home.id === teamId || m.away.id === teamId);
  // Real fixture matches are "rnds" — filter alongside round-variant events.
  const matches = activeFilters.rnds ? allTeamMatches : [];

  const teamEvents = (eventsData || []).filter(e => {
    if (!e.teams?.includes('*') && !e.teams?.includes(slug)) return false;
    if (e.xplorerRound) {
      const covered = data.matches.some(m =>
        (m.home.id === teamId || m.away.id === teamId) && m.round === e.xplorerRound
      );
      if (covered) return false;
    }
    // Notes always pass — they're contextual and not user-toggleable.
    if (e.type !== 'event') return true;
    if (e.variant === 'round') return activeFilters.rnds;
    if (e.variant === 'gala')  return activeFilters.galas;
    return activeFilters.events;
  });

  const upcomingMatches = matches.filter(m => m.type === 'fixture' && new Date(m.dateTime) >= now);
  const pastMatches     = [...matches.filter(m => m.type === 'result' || new Date(m.dateTime) < now)].reverse();

  const upcomingEvents = teamEvents.filter(e => {
    if (e.status === 'cancelled' || e.status === 'completed') return false;
    const dt = eventDt(e);
    return dt ? dt >= now : e.type === 'note';
  });
  const pastEvents = teamEvents.filter(e => {
    if (e.type === 'note') return false;
    const dt = eventDt(e);
    return dt ? dt < now : false;
  });

  const upcomingAll = [
    ...upcomingMatches.map(m => ({ kind: 'match', dt: new Date(m.dateTime), item: m })),
    ...upcomingEvents.map(e => ({ kind: e.type,   dt: eventDt(e) ?? new Date('9999-12-31'), item: e })),
  ].sort((a, b) => a.dt - b.dt);

  const pastAll = [
    ...pastMatches.map(m => ({ kind: 'match', dt: new Date(m.dateTime), item: m })),
    ...pastEvents.map(e => ({ kind: e.type,   dt: eventDt(e),           item: e })),
  ].sort((a, b) => b.dt - a.dt);

  let html = '';

  if (upcomingAll.length > 0) {
    html += `<div class="section-header">Upcoming</div>`;
    let markedNext = false;
    for (const { kind, item } of upcomingAll) {
      if (kind === 'match') {
        const isNext = !markedNext;
        if (isNext) markedNext = true;
        html += renderMatch(item, isNext);
      } else if (kind === 'event') {
        html += renderEvent(item);
      } else if (kind === 'note') {
        html += renderNote(item);
      }
    }
  }

  if (pastAll.length > 0) {
    html += `<div class="section-header">Completed games</div>`;
    for (const { kind, item } of pastAll) {
      if (kind === 'match')      html += renderMatch(item, false);
      else if (kind === 'event') html += renderEvent(item);
    }
  }

  if (upcomingAll.length === 0 && pastAll.length === 0) {
    html = `<div class="empty">No matches found for the selected team.</div>`;
  }

  document.getElementById('calendar').innerHTML = html;
  injectPanelsAndHandlers();
}

// ── team selection & URL hash ─────────────────────────────────────────────────

function copyTeamLink() {
  // location.href is kept in sync with the open state (team + expanded row) by replaceState,
  // so sharing it always captures whatever the user currently sees.
  const expandedRow = document.querySelector('.row.expanded');
  const teamSlug = currentTeam ? SLUG_BY_ID[currentTeam] : '';
  let hash = '';
  if (expandedRow) hash = '#' + rowHash(expandedRow.id);
  else if (teamSlug) hash = '#' + teamSlug;
  const url = location.href.split('#')[0] + hash;
  const teamLabel = currentTeam
    ? (document.querySelector(`.token[data-team="${currentTeam}"]`)?.getAttribute('aria-label')
       || document.querySelector(`.token[data-team="${currentTeam}"]`)?.textContent
       || 'LCJRU')
    : 'LCJRU';
  const shareData = { title: 'LCJRU Fixtures', text: `${teamLabel} fixtures`, url };
  const flashCopied = () => {
    const labelEl = document.querySelector('#copy-link-btn .action-label');
    if (!labelEl) return;
    labelEl.textContent = 'Copied';
    setTimeout(() => { labelEl.textContent = 'Share'; }, 2000);
  };
  // Native share sheet on Android / iOS where supported; clipboard fallback elsewhere.
  if (navigator.share && navigator.canShare?.(shareData)) {
    navigator.share(shareData).catch((err) => {
      // User-cancelled share dialogs reject with AbortError — don't surprise them with a clipboard write.
      if (err?.name !== 'AbortError') navigator.clipboard?.writeText(url).then(flashCopied);
    });
  } else if (navigator.clipboard?.writeText) {
    navigator.clipboard.writeText(url).then(flashCopied);
  }
}

let currentIcsUrl = '';

function copyIcsUrl() {
  navigator.clipboard.writeText(currentIcsUrl).then(() => {
    const labelEl = document.querySelector('#cal-copy-ics .cal-option-label');
    labelEl.textContent = 'Copied to clipboard';
    setTimeout(() => { labelEl.textContent = 'Copy ICS link'; }, 2000);
    closeCalPopover();
  });
}

function openCalPopover() {
  document.getElementById('cal-popover').classList.add('open');
  document.getElementById('cal-trigger').setAttribute('aria-expanded', 'true');
}
function closeCalPopover() {
  document.getElementById('cal-popover').classList.remove('open');
  document.getElementById('cal-trigger').setAttribute('aria-expanded', 'false');
}
function toggleCalPopover() {
  if (document.getElementById('cal-popover').classList.contains('open')) closeCalPopover();
  else openCalPopover();
}

// Runs `apply` inside a view transition when supported — `view-transition-name`
// on .token.active and the header pill means the active token morphs between
// its grid cell and the header pill instead of jump-cutting. Falls back to a
// plain call elsewhere.
function withTokenAnimation(apply) {
  if (document.startViewTransition) document.startViewTransition(apply);
  else apply();
}

// Sync the header team pill (visibility + label) with the current state.
// When `collapsed`, the grid is hidden and the pill stands in for it; the
// pill mirrors the active token's HTML so the squad colours carry across.
function syncTeamPill(teamId, collapsed) {
  const pill = document.getElementById('team-pill');
  const label = document.getElementById('team-pill-label');
  if (!pill || !label) return;
  if (teamId && collapsed) {
    const token = document.querySelector(`.token[data-team="${teamId}"]`);
    label.innerHTML = token?.innerHTML ?? '';
    pill.setAttribute('aria-label', `${token?.getAttribute('aria-label') ?? token?.textContent ?? 'Team'} — show all teams`);
    pill.removeAttribute('hidden');
  } else {
    pill.setAttribute('hidden', '');
    label.innerHTML = '';
  }
}

// Toggle the token-grid collapsed state. The pill takes over when collapsed,
// so any caller of this function also wants the pill to follow suit.
function setTokensCollapsed(collapsed, { animate = true } = {}) {
  const grid = document.getElementById('team-tokens');
  if (!grid) return;
  const apply = () => {
    grid.classList.toggle('collapsed', collapsed);
    syncTeamPill(currentTeam, collapsed);
  };
  if (animate) withTokenAnimation(apply);
  else apply();
}

function selectTeam(teamId, pushState = true, { animate = true } = {}) {
  const previousTeam = currentTeam;
  currentTeam = teamId;

  // The active class swap + collapsed toggle + pill swap drive the View
  // Transitions animation, so they must all happen inside the same callback —
  // otherwise the browser captures snapshots that don't reflect the user's
  // intent (e.g. label crossfade between teams won't fire).
  const applyTokenState = () => {
    document.querySelectorAll('.token').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.team === teamId);
    });
    document.getElementById('team-tokens').classList.toggle('collapsed', !!teamId);
    syncTeamPill(teamId, !!teamId);
  };
  if (animate && previousTeam !== teamId) withTokenAnimation(applyTokenState);
  else applyTokenState();

  const actionBar = document.getElementById('action-bar');
  const homeBtn = document.getElementById('clear-btn');
  if (teamId) { actionBar.removeAttribute('hidden'); homeBtn.removeAttribute('hidden'); }
  else { actionBar.setAttribute('hidden', ''); homeBtn.setAttribute('hidden', ''); closeCalPopover(); }
  if (teamId) {
    const slug = SLUG_BY_ID[teamId];
    const webcalUrl = `webcal://denishoctor.github.io/lcjru-fixtures/${slug}.ics`;
    currentIcsUrl = `https://denishoctor.github.io/lcjru-fixtures/${slug}.ics`;
    document.getElementById('cal-ical').href = webcalUrl;
    document.getElementById('cal-google').href =
      `https://calendar.google.com/calendar/r?cid=${encodeURIComponent(webcalUrl)}`;
  }

  // Persist the choice so a returning user lands on their team.
  saveTeam(teamId);

  const slug = teamId ? SLUG_BY_ID[teamId] : '';
  if (pushState) {
    history.pushState(null, '', slug ? '#' + slug : location.href.split('#')[0]);
  }

  if (fixturesData) render(fixturesData, teamId);
}

function readHash() {
  const slug = location.hash.replace('#', '').split('/')[0];
  return TEAM_SLUGS[slug] || null;
}

function readHashAnchor() {
  const parts = location.hash.replace('#', '').split('/');
  return parts.length > 1 ? parts.slice(1).join('/') : '';
}

// Scrolls the row with id=rowId into view and opens its panel(s) if expandable.
// Used on initial load and on hashchange so deep links always land on the open state.
// expandRow handles its own scroll; only non-expandable rows need a manual scroll here.
function focusRow(rowId) {
  if (!rowId) return;
  const row = document.getElementById(rowId);
  if (!row) return;
  const isExpandable = row.classList.contains('has-lineup') || row.classList.contains('has-venue-details');
  if (isExpandable && !row.classList.contains('expanded')) {
    expandRow(row);
  } else {
    row.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }
}

document.querySelectorAll('.token').forEach(btn => {
  btn.addEventListener('click', () => {
    const id = btn.dataset.team;
    const next = id === currentTeam ? null : id;
    if (next) trackEvent('team-' + (SLUG_BY_ID[next] || next));
    selectTeam(next);
  });
});

// Fires a GoatCounter custom event. Safe no-op if the script is blocked or still loading.
function trackEvent(name) {
  window.goatcounter?.count?.({ path: name, event: true });
}

// For an expanded row, fires `lineup-<matchId>` or `venue-<matchId>` matching the panel
// the user actually sees (default 'lineup' when the row has both).
function trackRowExpand(row) {
  const matchId = row.dataset.matchId;
  if (!matchId) return;
  const hasLineup = row.classList.contains('has-lineup');
  const hasVenue  = row.classList.contains('has-venue-details');
  const tab = (hasLineup && hasVenue) ? (row.dataset.activeTab || 'lineup')
            : hasLineup ? 'lineup'
            : hasVenue  ? 'venue'
            : null;
  if (tab) trackEvent(`${tab}-${matchId}`);
}

document.getElementById('copy-link-btn').addEventListener('click', () => { trackEvent('share-link'); copyTeamLink(); });
document.getElementById('cal-copy-ics').addEventListener('click', () => { trackEvent('cal-copy-ics'); copyIcsUrl(); });
document.getElementById('clear-btn').addEventListener('click', () => selectTeam(null));

// The header pill is the visible signpost for the collapsed selection;
// tapping it brings the full grid back so the user can switch teams without
// first going home. The pill itself disappears (the morph plays in reverse).
document.getElementById('team-pill').addEventListener('click', () => {
  trackEvent('team-pill-expand');
  setTokensCollapsed(false);
});

// Filter toggles — flip the bit, persist, re-render the active team's view.
function syncFilterButtons() {
  document.querySelectorAll('.filter-toggle').forEach(btn => {
    const on = !!activeFilters[btn.dataset.filter];
    btn.classList.toggle('active', on);
    btn.setAttribute('aria-pressed', String(on));
  });
}
document.getElementById('filter-group').addEventListener('click', (e) => {
  const btn = e.target.closest('.filter-toggle');
  if (!btn) return;
  const key = btn.dataset.filter;
  activeFilters[key] = !activeFilters[key];
  try { localStorage.setItem(FILTER_KEY, JSON.stringify(activeFilters)); } catch { /* private mode */ }
  trackEvent(`filter-${key}-${activeFilters[key] ? 'on' : 'off'}`);
  syncFilterButtons();
  if (currentTeam && fixturesData) render(fixturesData, currentTeam);
});
syncFilterButtons();

document.getElementById('cal-trigger').addEventListener('click', (e) => {
  e.stopPropagation();
  toggleCalPopover();
});
document.getElementById('cal-ical').addEventListener('click', () => { trackEvent('cal-ical'); closeCalPopover(); });
document.getElementById('cal-google').addEventListener('click', () => { trackEvent('cal-google'); closeCalPopover(); });
document.addEventListener('click', (e) => {
  const popover = document.getElementById('cal-popover');
  if (!popover.classList.contains('open')) return;
  if (!e.target.closest('#cal-popover') && !e.target.closest('#cal-trigger')) {
    closeCalPopover();
  }
});
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closeCalPopover();
});

// Delegated calendar click handler: covers row '#' anchors and panel tabs. Survives every
// render() rebuild because it's bound once on the calendar container.
document.getElementById('calendar').addEventListener('click', (e) => {
  // Tab click — switch which panel is shown, no scroll, no URL change.
  const tabBtn = e.target.closest('.panel-tab');
  if (tabBtn) {
    const tabsBar = tabBtn.closest('.panel-tabs');
    const matchId = tabsBar?.id.replace('tabs-', '');
    const row = matchId ? document.querySelector(`.row[data-match-id="${matchId}"]`) : null;
    if (row) {
      switchTab(row, tabBtn.dataset.tab);
      trackEvent(`${tabBtn.dataset.tab}-${matchId}`);
    }
    return;
  }

  // Row '#' anchor — copy the deep link, expand the row so the sender's view matches what the
  // recipient will land on, flash a tick for feedback.
  const a = e.target.closest('.row-anchor');
  if (!a) return;
  e.preventDefault();
  const row = a.closest('.row');
  if (!row) return;
  const url = location.href.split('#')[0] + '#' + rowHash(row.id);
  const flash = () => {
    const original = a.textContent;
    a.textContent = '✓';
    a.classList.add('row-anchor-copied');
    setTimeout(() => {
      a.textContent = original;
      a.classList.remove('row-anchor-copied');
    }, 1500);
  };
  if (navigator.clipboard?.writeText) {
    navigator.clipboard.writeText(url).then(flash, flash);
  } else {
    flash();
  }
  const canExpand = row.classList.contains('has-lineup') || row.classList.contains('has-venue-details');
  if (canExpand && !row.classList.contains('expanded')) {
    expandRow(row);
    trackRowExpand(row);
  }
  history.replaceState(null, '', '#' + rowHash(row.id));
});

window.addEventListener('hashchange', () => {
  const teamId = readHash();
  selectTeam(teamId, false);
  requestAnimationFrame(() => focusRow(readHashAnchor()));
});

// ── install hint & service worker ─────────────────────────────────────────────

const INSTALL_DISMISSED_KEY = 'lcjru-install-hint-dismissed';

function isStandalone() {
  return window.matchMedia?.('(display-mode: standalone)').matches
      || window.navigator.standalone === true;
}

function isIOSSafari() {
  const ua = navigator.userAgent;
  const iOS = /iPad|iPhone|iPod/.test(ua) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
  const webkit = /WebKit/.test(ua) && !/CriOS|FxiOS|EdgiOS|OPiOS/.test(ua);
  return iOS && webkit;
}

function setupInstallHint() {
  const hint = document.getElementById('install-hint');
  const text = document.getElementById('install-hint-text');
  const cta = document.getElementById('install-hint-cta');
  const dismiss = document.getElementById('install-hint-dismiss');
  if (!hint || !text || !cta || !dismiss) return;

  if (isStandalone()) return;
  // localStorage access can throw in some private modes — treat any failure as "not dismissed".
  let dismissed = false;
  try { dismissed = localStorage.getItem(INSTALL_DISMISSED_KEY) === '1'; } catch { /* ignore */ }
  if (dismissed) return;

  let deferredPrompt = null;

  dismiss.addEventListener('click', () => {
    hint.classList.remove('visible');
    try { localStorage.setItem(INSTALL_DISMISSED_KEY, '1'); } catch { /* private mode */ }
  });

  // Android / desktop Chromium — prompt available.
  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
    text.innerHTML = 'Install <b>LCJRU Fixtures</b> for one-tap home-screen access.';
    cta.hidden = false;
    hint.classList.add('visible');
  });

  cta.addEventListener('click', async () => {
    if (!deferredPrompt) return;
    deferredPrompt.prompt();
    try { await deferredPrompt.userChoice; } catch { /* dismissed */ }
    deferredPrompt = null;
    hint.classList.remove('visible');
  });

  window.addEventListener('appinstalled', () => {
    hint.classList.remove('visible');
    deferredPrompt = null;
  });

  // iOS Safari — no beforeinstallprompt, so show a manual tip.
  if (isIOSSafari()) {
    text.innerHTML = 'Install: tap <kbd>Share</kbd> then <b>Add to Home Screen</b>.';
    cta.hidden = true;
    hint.classList.add('visible');
  }
}

function registerServiceWorker() {
  if (!('serviceWorker' in navigator)) return;
  if (location.protocol !== 'https:' && location.hostname !== 'localhost' && location.hostname !== '127.0.0.1') return;
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(() => { /* best-effort */ });
  });
}

// ── init ──────────────────────────────────────────────────────────────────────

async function init() {
  const calendar = document.getElementById('calendar');
  calendar.innerHTML = '<div class="empty">Loading fixtures…</div>';

  let data;
  try {
    const [fixturesRes, lineupsRes, eventsRes] = await Promise.allSettled([
      fetch(FIXTURES_URL).then(r => { if (!r.ok) throw new Error(`HTTP ${r.status}`); return r.json(); }),
      fetch('lineups.json').then(r => r.ok ? r.json() : {}),
      fetch('./events.json').then(r => r.ok ? r.json() : []),
    ]);
    if (fixturesRes.status === 'rejected') throw fixturesRes.reason;
    data        = fixturesRes.value;
    lineupsData = lineupsRes.status === 'fulfilled' ? lineupsRes.value : {};
    eventsData  = eventsRes.status  === 'fulfilled' ? eventsRes.value  : [];
  } catch (err) {
    calendar.innerHTML = `<div class="empty">Could not load fixtures. ${esc(err.message)}</div>`;
    return;
  }

  fixturesData = data;

  const stamp = document.getElementById('updated-stamp');
  const updated = new Date(data.updated);
  const staleHours = (Date.now() - updated.getTime()) / 3600000;
  stamp.textContent = `Updated ${updated.toLocaleDateString('en-AU', {
    day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit', timeZone: 'Australia/Sydney'
  })} AEST`;
  if (staleHours > 4) {
    stamp.textContent += ' · sync may be delayed';
    stamp.style.color = '#F0A030';
  }

  // Hash wins (deep links beat preferences); otherwise fall back to the
  // previously selected team from localStorage. The first paint shouldn't
  // animate — the grid jumps straight to its collapsed state.
  const initialTeam = readHash() ?? loadSavedTeam();
  if (initialTeam) {
    selectTeam(initialTeam, false, { animate: false });
  } else {
    render(data, null);
  }

  requestAnimationFrame(() => focusRow(readHashAnchor()));
}

setupInstallHint();
registerServiceWorker();
init();
</script>
</body>
</html>
