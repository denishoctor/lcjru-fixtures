<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<title>LCJRU — Player of the Match admin</title>
<style>
  :root {
    --navy: #021444; --gold: #F4C842; --gold-soft: #F8E08E;
    --cream: #FBF6E3; --cream-edge: #F0E2A8; --muted: #6B6B6B; --rule: #E4D9B0;
    --win: #2E7D32; --loss: #B23A3A;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--cream); color: var(--navy); line-height: 1.4;
  }
  header {
    background: var(--navy); color: #fff; padding: 14px 18px;
    border-bottom: 6px solid var(--gold); display: flex; align-items: center;
    justify-content: space-between; gap: 12px; flex-wrap: wrap;
  }
  header h1 { font-size: 16px; margin: 0; letter-spacing: .5px; }
  header .eyebrow { text-transform: uppercase; letter-spacing: 2px; font-size: 10px; color: var(--gold); }
  main { max-width: 760px; margin: 0 auto; padding: 18px; }
  .notice {
    background: #fff; border: 1px solid var(--rule); border-radius: 8px;
    padding: 16px; margin: 16px 0; font-size: 14px;
  }
  .notice.error { border-color: var(--loss); color: var(--loss); }
  .notice code { background: var(--cream); padding: 1px 5px; border-radius: 3px; }
  a { color: var(--navy); }
  .toolbar { display: flex; gap: 10px; align-items: center; margin: 10px 0 16px; flex-wrap: wrap; }
  .search { flex: 1; min-width: 180px; padding: 9px 12px; border: 1.5px solid var(--cream-edge);
    border-radius: 8px; font: inherit; background: #fff; }
  .game {
    background: #fff; border: 1px solid var(--rule); border-radius: 8px;
    margin: 8px 0; overflow: hidden;
  }
  .game-head {
    display: flex; align-items: center; gap: 10px; padding: 10px 12px; cursor: pointer;
  }
  .game-head:hover { background: var(--cream); }
  .game-when { font-size: 12px; color: var(--muted); min-width: 86px; font-variant-numeric: tabular-nums; }
  .pill {
    font-size: 11px; font-weight: 800; padding: 2px 8px; border-radius: 999px;
    background: var(--navy); color: #fff; white-space: nowrap;
  }
  .game-teams { flex: 1; font-size: 14px; }
  .score { font-variant-numeric: tabular-nums; font-weight: 700; }
  .score.win { color: var(--win); } .score.loss { color: var(--loss); }
  .game-potm { font-size: 13px; font-weight: 700; white-space: nowrap; }
  .game-potm.none { color: var(--muted); font-weight: 400; font-style: italic; }
  .editor { padding: 12px; border-top: 1px solid var(--rule); background: var(--cream); display: none; }
  .editor.open { display: block; }
  .editor label { display: block; font-size: 11px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 1px; color: var(--muted); margin: 8px 0 4px; }
  .editor select, .editor input[type=text] {
    width: 100%; padding: 9px 12px; border: 1.5px solid var(--cream-edge);
    border-radius: 8px; font: inherit; background: #fff;
  }
  .source-tag { font-size: 11px; font-weight: 600; color: var(--muted); margin-left: 6px; text-transform: none; letter-spacing: 0; }
  .emoji-row { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 4px; }
  .emoji-btn { font-size: 18px; padding: 4px 8px; border: 1.5px solid var(--cream-edge);
    background: #fff; border-radius: 8px; cursor: pointer; }
  .emoji-btn.active { border-color: var(--navy); background: var(--gold-soft); }
  .editor-actions { display: flex; gap: 8px; margin-top: 14px; align-items: center; flex-wrap: wrap; }
  button.primary { background: var(--navy); color: #fff; border: none; padding: 9px 16px;
    border-radius: 8px; font: inherit; font-weight: 700; cursor: pointer; }
  button.ghost { background: transparent; color: var(--loss); border: 1.5px solid var(--loss);
    padding: 8px 14px; border-radius: 8px; font: inherit; cursor: pointer; }
  button:disabled { opacity: .5; cursor: default; }
  .editor-msg { font-size: 13px; }
  .editor-msg.ok { color: var(--win); } .editor-msg.err { color: var(--loss); }
  .section-title { font-size: 12px; font-weight: 800; text-transform: uppercase; letter-spacing: 1.5px;
    color: var(--muted); margin: 26px 0 8px; }
  .audit { font-size: 12.5px; }
  .audit-row { padding: 6px 0; border-bottom: 1px solid var(--rule); display: flex; gap: 8px; flex-wrap: wrap; }
  .audit-when { color: var(--muted); font-variant-numeric: tabular-nums; }
  .audit-action { font-weight: 700; }
  #signin { margin-top: 24px; }
  .hidden { display: none; }
</style>
</head>
<body>
<header>
  <div>
    <div class="eyebrow">Lane Cove JRU</div>
    <h1>Player of the Match — Admin</h1>
  </div>
  <div id="userbtn"></div>
</header>
<main>
  <div id="status" class="notice">Loading…</div>
  <div id="signin"></div>
  <div id="app" class="hidden">
    <div class="toolbar">
      <input id="search" class="search" type="text" placeholder="Filter by team or opponent…" autocomplete="off">
    </div>
    <div id="games"></div>
    <div class="section-title">Recent activity</div>
    <div id="audit" class="audit">—</div>
  </div>
  <p style="margin-top:28px;font-size:12px;color:var(--muted)">
    <a href="./index.html">← Back to fixtures</a> ·
    Open-write: anyone signed in can set POTM; every change is recorded above.
  </p>
</main>

<script src="./config.js"></script>
<script src="./auth-config.js"></script>
<script type="module">
import { esc, isLaneCove, shortTeamName, fmtDow, fmtDate, scoreClass,
         isCompletedGame, potmCandidates, potmEmoji } from './render.mjs';
import { isPotmConfigured, loadPotm, savePotm, deletePotm, loadAudit } from './potm.js';

const AUTH = window.LCJRU_AUTH || {};
const CFG  = window.LCJRU_CONFIG || {};
const TEAM_SLUGS = CFG.TEAM_SLUGS || {};
const SQUADS     = CFG.SQUADS || {};
const SLUG_BY_ID = Object.fromEntries(Object.entries(TEAM_SLUGS).map(([s, id]) => [id, s]));
const EMOJIS = ['🏅', '⭐', '🌟', '🏆', '💪', '🔥'];

const statusEl = document.getElementById('status');
const signinEl = document.getElementById('signin');
const appEl    = document.getElementById('app');
const gamesEl  = document.getElementById('games');
const auditEl  = document.getElementById('audit');

let clerk = null;
let fixturesData = null;
let lineupsData = {};
let potmData = {};
let games = [];          // completed LC matches, most recent first
let openMatchId = null;

function setStatus(html, kind = '') {
  statusEl.className = 'notice' + (kind ? ' ' + kind : '');
  statusEl.innerHTML = html;
  statusEl.classList.remove('hidden');
}

// ── boot ────────────────────────────────────────────────────────────────────
async function boot() {
  if (!AUTH.clerkPublishableKey || !isPotmConfigured()) {
    setStatus(
      'POTM admin is not configured yet. Add your Clerk and Supabase keys to ' +
      '<code>docs/auth-config.js</code> — see <code>docs/POTM-SETUP.md</code> for the full setup.',
      'error',
    );
    return;
  }
  try {
    await loadClerk(AUTH.clerkPublishableKey);
  } catch (err) {
    setStatus('Could not load Clerk: ' + esc(err.message), 'error');
    return;
  }
  clerk.addListener(() => renderAuthState());
  await renderAuthState();
}

// Load the Clerk browser SDK from the instance's Frontend API (derived from the publishable
// key), using the standard hotloading data-attribute so window.Clerk is ready to .load().
function loadClerk(pubKey) {
  return new Promise((resolve, reject) => {
    let domain;
    try { domain = atob(pubKey.split('_')[2]).replace(/\$$/, ''); }
    catch { return reject(new Error('Invalid publishable key')); }
    const script = document.createElement('script');
    script.async = true;
    script.crossOrigin = 'anonymous';
    script.setAttribute('data-clerk-publishable-key', pubKey);
    script.src = `https://${domain}/npm/@clerk/clerk-js@6/dist/clerk.browser.js`;
    script.onerror = () => reject(new Error('Failed to load Clerk SDK'));
    script.onload = async () => {
      try { clerk = window.Clerk; await clerk.load(); resolve(); }
      catch (e) { reject(e); }
    };
    document.head.appendChild(script);
  });
}

async function renderAuthState() {
  clerk.mountUserButton(document.getElementById('userbtn'));
  if (clerk.user) {
    signinEl.innerHTML = '';
    appEl.classList.remove('hidden');
    await loadData();
  } else {
    appEl.classList.add('hidden');
    setStatus('Sign in to manage Player of the Match.');
    clerk.mountSignIn(signinEl);
  }
}

// ── data ──────────────────────────────────────────────────────────────────────
async function loadData() {
  setStatus('Loading fixtures…');
  try {
    const [fx, lu, pm] = await Promise.all([
      fetch('./fixtures.json').then(r => r.json()),
      fetch('./lineups.json').then(r => r.ok ? r.json() : {}),
      loadPotm(),
    ]);
    fixturesData = fx; lineupsData = lu || {}; potmData = pm || {};
  } catch (err) {
    setStatus('Could not load fixtures: ' + esc(err.message), 'error');
    return;
  }
  statusEl.classList.add('hidden');

  const now = new Date();
  games = (fixturesData.matches || [])
    .filter(m => (isLaneCove(m.home) || isLaneCove(m.away)) && isCompletedGame(m, now))
    .sort((a, b) => new Date(b.dateTime) - new Date(a.dateTime));

  renderGames('');
  refreshAudit();
}

// ── games list ─────────────────────────────────────────────────────────────────
function lcTeamOf(m) { return isLaneCove(m.home) ? m.home : m.away; }
function oppOf(m)    { return isLaneCove(m.home) ? m.away : m.home; }

function renderGames(filter) {
  const q = filter.trim().toLowerCase();
  const list = games.filter(m => {
    if (!q) return true;
    return (lcTeamOf(m).name + ' ' + oppOf(m).name).toLowerCase().includes(q);
  });
  if (!list.length) { gamesEl.innerHTML = '<div class="notice">No completed Lane Cove games match.</div>'; return; }
  gamesEl.innerHTML = list.map(renderGameRow).join('');
  if (openMatchId && list.some(m => m.id === openMatchId)) openEditor(openMatchId, true);
}

function renderGameRow(m) {
  const lc = lcTeamOf(m), opp = oppOf(m);
  const sc = scoreClass(m);
  const scoreTxt = m.home.score !== null && m.away.score !== null
    ? `<span class="score ${sc}">${esc(m.home.score)}–${esc(m.away.score)}</span>` : '';
  const potm = potmData[m.id];
  const potmTxt = potm && potm.player_name
    ? `<span class="game-potm">${esc(potmEmoji(potm))} ${esc(potm.player_name)}</span>`
    : '<span class="game-potm none">No POTM</span>';
  return `<div class="game" data-match-id="${esc(m.id)}">
    <div class="game-head" data-act="toggle">
      <span class="game-when">${esc(fmtDow(m.dateTime))} ${esc(fmtDate(m.dateTime))}</span>
      <span class="pill">${esc(shortTeamName(lc.name))}</span>
      <span class="game-teams">v ${esc(opp.name)} ${scoreTxt}</span>
      ${potmTxt}
    </div>
    <div class="editor" id="editor-${esc(m.id)}"></div>
  </div>`;
}

// ── editor ──────────────────────────────────────────────────────────────────────
function openEditor(matchId, keepOpen = false) {
  const wrap = gamesEl.querySelector(`.game[data-match-id="${cssEsc(matchId)}"] .editor`);
  if (!wrap) return;
  const already = wrap.classList.contains('open');
  // Close any other open editor
  gamesEl.querySelectorAll('.editor.open').forEach(e => { if (e !== wrap) { e.classList.remove('open'); e.innerHTML = ''; } });
  if (already && !keepOpen) { wrap.classList.remove('open'); wrap.innerHTML = ''; openMatchId = null; return; }

  const m = games.find(g => g.id === matchId);
  const entry = lineupsData[matchId];
  const { source, players } = potmCandidates(m, entry, SQUADS, SLUG_BY_ID);
  const current = potmData[matchId] || null;
  const curName = current?.player_name || '';
  const curEmoji = potmEmoji(current);

  const sourceLabel = source === 'lineup' ? 'from published team sheet'
    : source === 'squad' ? 'from club squad' : 'no roster on file — type a name';
  const matchesCandidate = players.some(p => p.name === curName);

  const opts = players.map(p => {
    const label = p.number ? `#${p.number} ${p.name}` : p.name;
    const sel = p.name === curName ? ' selected' : '';
    return `<option value="${esc(p.name)}" data-number="${esc(p.number ?? '')}"${sel}>${esc(label)}</option>`;
  }).join('');
  const otherSel = curName && !matchesCandidate ? ' selected' : '';

  wrap.innerHTML = `
    <label>Player <span class="source-tag">(${esc(sourceLabel)})</span></label>
    <select class="potm-select">
      <option value="">— none —</option>
      ${opts}
      <option value="__other__"${otherSel}>Other (type a name)…</option>
    </select>
    <div class="other-wrap ${otherSel ? '' : 'hidden'}" style="margin-top:8px">
      <input type="text" class="potm-other" placeholder="Player name" value="${otherSel ? esc(curName) : ''}">
    </div>
    <label>Emoji</label>
    <div class="emoji-row">
      ${EMOJIS.map(e => `<button type="button" class="emoji-btn${e === curEmoji ? ' active' : ''}" data-emoji="${esc(e)}">${esc(e)}</button>`).join('')}
    </div>
    <div class="editor-actions">
      <button type="button" class="primary" data-act="save">Save POTM</button>
      ${current ? '<button type="button" class="ghost" data-act="clear">Clear</button>' : ''}
      <span class="editor-msg"></span>
    </div>`;
  wrap.classList.add('open');
  openMatchId = matchId;
}

function cssEsc(s) { return String(s).replace(/["\\]/g, '\\$&'); }

// ── event delegation ─────────────────────────────────────────────────────────
document.getElementById('search').addEventListener('input', (e) => renderGames(e.target.value));

gamesEl.addEventListener('click', async (e) => {
  const head = e.target.closest('.game-head');
  if (head) { openEditor(head.parentElement.dataset.matchId); return; }

  const emojiBtn = e.target.closest('.emoji-btn');
  if (emojiBtn) {
    emojiBtn.parentElement.querySelectorAll('.emoji-btn').forEach(b => b.classList.remove('active'));
    emojiBtn.classList.add('active');
    return;
  }

  const saveBtn = e.target.closest('[data-act="save"]');
  if (saveBtn) { await onSave(saveBtn); return; }

  const clearBtn = e.target.closest('[data-act="clear"]');
  if (clearBtn) { await onClear(clearBtn); return; }
});

gamesEl.addEventListener('change', (e) => {
  const sel = e.target.closest('.potm-select');
  if (!sel) return;
  const otherWrap = sel.parentElement.querySelector('.other-wrap');
  otherWrap.classList.toggle('hidden', sel.value !== '__other__');
});

function editorContext(btn) {
  const wrap = btn.closest('.editor');
  const matchId = wrap.parentElement.dataset.matchId;
  const sel = wrap.querySelector('.potm-select');
  const msg = wrap.querySelector('.editor-msg');
  const activeEmoji = wrap.querySelector('.emoji-btn.active')?.dataset.emoji || '🏅';
  let playerName = sel.value, playerNumber = null;
  if (sel.value === '__other__') {
    playerName = wrap.querySelector('.potm-other').value.trim();
  } else if (sel.value) {
    playerNumber = sel.selectedOptions[0]?.dataset.number || null;
  }
  return { wrap, matchId, sel, msg, activeEmoji, playerName, playerNumber };
}

async function onSave(btn) {
  const ctx = editorContext(btn);
  if (!ctx.playerName) { showMsg(ctx.msg, 'Pick or type a player first.', 'err'); return; }
  setBusy(ctx.wrap, true);
  showMsg(ctx.msg, 'Saving…');
  try {
    const token = await clerk.session.getToken();
    const createdBy = clerk.user?.primaryEmailAddress?.emailAddress || clerk.user?.id || null;
    const row = await savePotm({
      matchId: ctx.matchId, playerName: ctx.playerName,
      playerNumber: ctx.playerNumber || null, emoji: ctx.activeEmoji, createdBy,
    }, token);
    potmData[ctx.matchId] = row || {
      match_id: ctx.matchId, player_name: ctx.playerName,
      player_number: ctx.playerNumber || null, emoji: ctx.activeEmoji,
    };
    showMsg(ctx.msg, 'Saved.', 'ok');
    rerenderKeepingFilter();
    refreshAudit();
  } catch (err) {
    showMsg(ctx.msg, 'Save failed: ' + err.message, 'err');
  } finally {
    setBusy(ctx.wrap, false);
  }
}

async function onClear(btn) {
  const ctx = editorContext(btn);
  setBusy(ctx.wrap, true);
  showMsg(ctx.msg, 'Clearing…');
  try {
    const token = await clerk.session.getToken();
    await deletePotm(ctx.matchId, token);
    delete potmData[ctx.matchId];
    openMatchId = null;
    showMsg(ctx.msg, 'Cleared.', 'ok');
    rerenderKeepingFilter();
    refreshAudit();
  } catch (err) {
    showMsg(ctx.msg, 'Clear failed: ' + err.message, 'err');
  } finally {
    setBusy(ctx.wrap, false);
  }
}

function showMsg(el, text, kind = '') { el.className = 'editor-msg' + (kind ? ' ' + kind : ''); el.textContent = text; }
function setBusy(wrap, busy) { wrap.querySelectorAll('button').forEach(b => b.disabled = busy); }
function rerenderKeepingFilter() { renderGames(document.getElementById('search').value); }

async function refreshAudit() {
  try {
    const token = await clerk.session.getToken();
    const rows = await loadAudit(token, 20);
    if (!rows.length) { auditEl.textContent = 'No changes recorded yet.'; return; }
    auditEl.innerHTML = rows.map(r => {
      const when = new Date(r.created_at).toLocaleString('en-AU', { timeZone: 'Australia/Sydney',
        day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit' });
      const who = r.actor_email || r.actor_id || 'unknown';
      const change = [r.old_player, r.new_player].filter(Boolean).join(' → ') || '(none)';
      return `<div class="audit-row">
        <span class="audit-when">${esc(when)}</span>
        <span class="audit-action">${esc(r.action)}</span>
        <span>${esc(change)}</span>
        <span style="color:var(--muted)">· ${esc(who)}</span>
      </div>`;
    }).join('');
  } catch {
    auditEl.textContent = 'Could not load activity.';
  }
}

boot();
</script>
</body>
</html>
