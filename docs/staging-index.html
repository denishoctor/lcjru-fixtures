<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Lane Cove Junior Rugby — Fixtures 2026</title>
<link rel="icon" href="https://digitalshift-assets.sfo2.cdn.digitaloceanspaces.com/pw/bacc8d3f-26ad-40d6-8a7f-e81787bacf96/favicon-1600636355774638552.png">
<style>
  :root {
    --navy: #021444;
    --gold: #F4C842;
    --gold-soft: #F8E08E;
    --cream: #FFF6D6;
    --cream-edge: #F0E2A8;
    --ink: #1A1A1A;
    --muted: #6B6B6B;
    --rule: #E5E5E5;
    --green: #2E7D4F;
  }
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Arial, sans-serif;
    margin: 0; background: #FAFAFA; color: var(--ink);
    -webkit-font-smoothing: antialiased;
  }
  .page { max-width: 900px; margin: 0 auto; background: #fff; box-shadow: 0 4px 24px rgba(0,0,0,.06); }

  /* HEADER */
  .header {
    background: var(--navy); color: #fff;
    padding: 20px 28px; display: flex; align-items: center;
    justify-content: space-between; border-bottom: 6px solid var(--gold); gap: 16px;
  }
  .header-left { display: flex; align-items: center; gap: 18px; }
  .crest { width: 64px; height: 78px; overflow: hidden; flex-shrink: 0; box-shadow: 0 2px 6px rgba(0,0,0,.25); }
  .crest img { width: 100%; height: 100%; object-fit: cover; object-position: center; display: block; }
  .eyebrow { text-transform: uppercase; letter-spacing: 2.5px; font-size: 11px; color: var(--gold); font-weight: 600; }
  .title-block h1 { font-size: 30px; margin: 4px 0 2px; font-weight: 800; letter-spacing: -.5px; }
  .title-block .tag { font-size: 13px; color: #C9D2E8; font-style: italic; }
  .header-right { text-align: right; font-size: 12px; line-height: 1.6; color: #DCE3F2; flex-shrink: 0; }
  .header-right a { color: #fff; font-weight: 700; }

  /* TOOLBAR — team token rows */
  .toolbar {
    padding: 10px 20px 8px;
    background: #FFFDF5;
    border-bottom: 1px solid var(--rule);
  }
  .token-row {
    display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
  }
  .token-row + .token-row { margin-top: 5px; }
  .token-label {
    font-size: 9px; font-weight: 800; text-transform: uppercase;
    letter-spacing: 1.5px; color: var(--muted); width: 60px; flex-shrink: 0;
  }
  .token {
    font-size: 11px; font-weight: 700;
    padding: 4px 10px; border-radius: 20px;
    border: 1.5px solid var(--cream-edge);
    background: var(--cream); color: var(--navy);
    cursor: pointer; user-select: none;
    transition: background .12s, color .12s, border-color .12s;
    white-space: nowrap; line-height: 1.3;
  }
  .token:hover { border-color: var(--navy); }
  .token.active {
    background: var(--navy); color: #fff; border-color: var(--navy);
  }
  .toolbar-meta {
    margin-top: 6px;
    font-size: 10px; color: var(--muted);
    display: flex; justify-content: space-between; align-items: center;
  }
  .clear-btn {
    font-size: 10px; font-weight: 700; color: var(--navy);
    background: none; border: none; cursor: pointer;
    padding: 0; text-decoration: underline; display: none;
  }
  .clear-btn.visible { display: inline; }
  .copy-link-btn {
    font-size: 10px; font-weight: 700; color: var(--navy);
    background: none; border: none; cursor: pointer;
    padding: 0; text-decoration: underline; display: none; white-space: nowrap;
  }
  .copy-link-btn.visible { display: inline; }
  .cal-links { display: none; align-items: center; gap: 6px; }
  .cal-links.visible { display: flex; }
  .cal-links a {
    font-size: 10px; font-weight: 700; color: var(--navy);
    text-decoration: none; white-space: nowrap;
  }
  .cal-links a:hover { text-decoration: underline; }
  .cal-sep { font-size: 10px; color: var(--muted); }


  /* WELCOME SCREEN */
  .welcome {
    padding: 36px 28px 44px;
    text-align: center;
    border-bottom: 1px solid var(--rule);
  }
  .welcome h2 {
    font-size: 21px; font-weight: 800; color: var(--navy);
    margin: 0 0 6px; letter-spacing: -.3px;
  }
  .welcome-sub {
    font-size: 14px; color: var(--muted);
    margin: 0 0 24px; line-height: 1.5;
  }
  .welcome-cta {
    display: inline-block;
    background: var(--gold); color: var(--navy);
    font-size: 13px; font-weight: 800;
    padding: 10px 22px; border-radius: 24px;
    margin-bottom: 36px; letter-spacing: .2px;
  }
  .feature-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
    gap: 12px; text-align: left;
  }
  .feature-card {
    background: var(--cream);
    border: 1px solid var(--cream-edge);
    border-radius: 8px;
    padding: 16px 14px;
  }
  .feature-icon { font-size: 22px; margin-bottom: 8px; line-height: 1; }
  .feature-title {
    font-size: 11px; font-weight: 800; color: var(--navy);
    text-transform: uppercase; letter-spacing: .8px; margin-bottom: 5px;
  }
  .feature-desc { font-size: 12px; color: var(--muted); line-height: 1.55; }

  /* SECTION HEADER */
  .section-header {
    padding: 7px 28px;
    background: #FFFDF5;
    border-top: 4px solid var(--gold);
    border-bottom: 1px solid var(--rule);
    text-transform: uppercase; letter-spacing: 2px;
    font-size: 10px; font-weight: 700; color: var(--navy);
  }

  /* ROW */
  .row {
    display: flex; align-items: center; gap: 14px;
    padding: 10px 28px; min-height: 78px;
    border-bottom: 1px solid var(--rule);
    scroll-margin-top: 8px;
    position: relative;
  }
  .row:last-child { border-bottom: none; }
  .row.next-up { background: #FFFFF0; }

  /* Anchor link on each row */
  .row-anchor {
    position: absolute; left: 8px; top: 50%; transform: translateY(-50%);
    font-size: 11px; color: #ccc; text-decoration: none;
    opacity: 0; transition: opacity .15s;
    line-height: 1;
  }
  .row:hover .row-anchor { opacity: 1; }
  .row-anchor:hover { color: var(--navy); }

  /* BADGE */
  .rnd-badge {
    width: 50px; height: 50px; border-radius: 50%;
    background: var(--navy); color: #fff;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    flex-shrink: 0; font-size: 8px; text-transform: uppercase; letter-spacing: 1.5px; line-height: 1;
  }
  .rnd-badge .num { font-size: 18px; font-weight: 800; margin-top: 2px; letter-spacing: 0; }
  .rnd-badge.final { background: var(--gold); color: var(--navy); }
  .rnd-badge.result { background: #2e5a1e; }
  .rnd-badge.past { background: #9E9E9E; }

  /* DATE/TIME BLOCK */
  .date-block { flex-shrink: 0; width: 74px; line-height: 1.25; }
  .date-block .dow { text-transform: uppercase; letter-spacing: 1.5px; font-size: 10px; color: var(--muted); }
  .date-block .date { font-size: 17px; font-weight: 700; color: var(--ink); }
  .date-block .time { font-size: 11px; font-weight: 600; color: var(--navy); margin-top: 1px; }
  .date-block .note { font-size: 9px; color: #C2185B; text-transform: uppercase; letter-spacing: 1px; font-weight: 700; margin-top: 2px; }
  .date-block .note.final { color: var(--navy); }

  /* VENUES */
  .venues { flex: 1; display: flex; flex-direction: column; gap: 4px; min-width: 0; }
  .venue { display: flex; align-items: center; gap: 7px; font-size: 13px; flex-wrap: wrap; }
  .team-pill {
    background: var(--cream); border: 1px solid var(--cream-edge);
    color: var(--navy); font-weight: 700; font-size: 10px;
    padding: 2px 8px; border-radius: 3px; letter-spacing: .5px;
    flex-shrink: 0; white-space: nowrap;
  }
  .venue-link {
    color: var(--ink); text-decoration: none;
    display: inline-flex; align-items: center; gap: 3px;
  }
  .venue-link span { border-bottom: 1px dotted #bbb; }
  .venue-link:hover { color: var(--navy); }
  .venue-link:hover span { border-bottom-color: var(--navy); }
  .icon-pin { width: 12px; height: 12px; fill: #bbb; flex-shrink: 0; transition: fill .12s; }
  .venue-link:hover .icon-pin { fill: var(--navy); }
  .pitch-on { font-size: 11px; color: var(--muted); white-space: nowrap; }
  .pitch-tag {
    font-size: 10px; font-weight: 700; letter-spacing: .5px; text-transform: uppercase;
    color: var(--muted); background: #F3F4F6;
    border: 1px solid var(--rule); border-radius: 10px;
    padding: 1px 8px;
  }
  .home-pill {
    background: var(--gold); color: var(--navy);
    font-size: 9px; font-weight: 800;
    padding: 2px 7px; border-radius: 3px;
    letter-spacing: 1px; text-transform: uppercase; flex-shrink: 0;
  }
  .derby-pill {
    background: #FFF3E0; color: #BF360C;
    font-size: 9px; font-weight: 800;
    padding: 2px 7px; border-radius: 3px;
    letter-spacing: 1px; text-transform: uppercase; flex-shrink: 0;
  }
  .opponent { color: var(--muted); font-size: 12px; }
  .score-pill { font-weight: 800; font-size: 13px; color: var(--ink); white-space: nowrap; }
  .score-pill.win  { color: var(--green); }
  .score-pill.loss { color: #b71c1c; }
  .score-pill.draw { color: var(--muted); }
  .result-badge {
    font-size: 9px; font-weight: 800; text-transform: uppercase;
    letter-spacing: 1px; padding: 2px 6px; border-radius: 3px; flex-shrink: 0;
  }
  .result-badge.win  { background: #E8F5E9; color: var(--green); }
  .result-badge.loss { background: #FFEBEE; color: #b71c1c; }
  .result-badge.draw { background: #F5F5F5; color: var(--muted); }

  /* REST */
  .row.rest { background: #F7F7F7; }
  .row.rest .rest-mark { width: 50px; text-align: center; color: #BDBDBD; font-size: 20px; flex-shrink: 0; }
  .row.rest .rest-title { font-size: 13px; font-weight: 700; color: var(--ink); }
  .row.rest .rest-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }

  .empty { padding: 40px 28px; text-align: center; color: var(--muted); font-size: 14px; }

  .footer-note {
    padding: 12px 28px; text-align: center; font-size: 11px;
    color: var(--muted); background: #FAFAFA; border-top: 1px solid var(--rule);
    letter-spacing: .5px;
  }
  .footer-note a { color: var(--navy); }

  /* LINEUP PANEL */
  .row.has-lineup { cursor: pointer; }
  .row.has-lineup:hover { background: var(--cream); }
  .row.expanded { background: var(--cream); }
  .lineup-panel {
    display: none;
    padding: 10px 16px 14px;
    border-bottom: 1px solid var(--rule);
    background: var(--cream);
  }
  .lineup-panel.open { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .lineup-col h4 {
    font-size: 10px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 1px; color: var(--muted); margin: 0 0 5px;
  }
  .lineup-player { display: flex; gap: 6px; padding: 1px 0; font-size: 13px; }
  .lineup-num {
    color: var(--muted); min-width: 18px; text-align: right;
    font-variant-numeric: tabular-nums; font-size: 12px; flex-shrink: 0;
  }
  .lineup-footer {
    grid-column: 1 / -1; font-size: 11px; color: var(--muted);
    padding-top: 8px; border-top: 1px solid var(--cream-edge); margin-top: 4px;
  }
  .lineup-footer a { color: var(--navy); }

  @media (max-width: 600px) {
    .header { flex-direction: column; align-items: flex-start; }
    .header-right { text-align: left; }
    .row { padding: 10px 16px; gap: 10px; }
    .toolbar { padding: 10px 14px 8px; }
    .section-header, .footer-note { padding-left: 16px; padding-right: 16px; }
    .welcome { padding: 28px 16px 36px; }
    .lineup-panel.open { grid-template-columns: 1fr; }
  }
</style>
</head>

<script>
const FIXTURES_URL = './fixtures.json';
const LC_CREST_PATTERN = '/30901.';

const { TEAM_SLUGS, VENUES, FINAL_ROUND } = window.LCJRU_CONFIG;
const SLUG_BY_ID = Object.fromEntries(Object.entries(TEAM_SLUGS).map(([s,id]) => [id,s]));

let currentTeam  = null; // teamId or null
let fixturesData = null;
let lineupsData  = null;

// ── venue display ─────────────────────────────────────────────────────────────

const PIN_SVG = '<svg class="icon-pin" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5S10.62 6.5 12 6.5s2.5 1.12 2.5 2.5S13.38 11.5 12 11.5z"/></svg>';

function parseVenue(rawVenue) {
  if (!rawVenue) return { display: '', pitch: null, mapsUrl: '#' };

  // Minis: "Tryon Oval TT1 (U6/U7)" → base="Tryon Oval", pitch="TT1"
  const miniMatch = rawVenue.match(/^(.+?) ((TT|M)\d+)\s*\([^)]+\)$/);
  if (miniMatch) {
    const base = miniMatch[1].trim();
    const pitch = miniMatch[2];
    const v = VENUES[base];
    const display = v?.suburb ? `${base}, ${v.suburb}` : base;
    return { display, pitch, mapsUrl: v?.mapsUrl || _genericMapsUrl(display) };
  }

  // Exact lookup first; then try stripping trailing field number (e.g. "Field 2")
  let base = rawVenue.trim();
  let pitch = null;
  let v = VENUES[base];
  if (!v) {
    const fieldMatch = base.match(/^(.+?) (\d+)$/);
    if (fieldMatch && VENUES[fieldMatch[1]]) {
      base  = fieldMatch[1];
      pitch = `Field ${fieldMatch[2]}`;
      v     = VENUES[base];
    }
  }

  const display = v?.suburb ? `${base}, ${v.suburb}` : base;
  return { display, pitch, mapsUrl: v?.mapsUrl || _genericMapsUrl(display) };
}

function _genericMapsUrl(display) {
  return `https://maps.google.com/?q=${encodeURIComponent(display + ', Sydney NSW')}`;
}

// ── helpers ──────────────────────────────────────────────────────────────────

function esc(str) {
  return String(str ?? '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

function isLaneCove(team) {
  return team.name.toLowerCase().includes('lane cove') || team.crest?.includes(LC_CREST_PATTERN);
}

function shortTeamName(name) {
  if (name.includes('Lane Cove/')) {
    return 'JV · ' + name.replace('Lane Cove/', '').replace(/\s*\d+$/, '').trim();
  }
  return name.replace('Lane Cove ', '').replace(' 2026', '').trim() || name;
}

function fmtDow(iso) {
  return new Date(iso).toLocaleDateString('en-AU', { weekday: 'short', timeZone: 'Australia/Sydney' });
}
function fmtDate(iso) {
  return new Date(iso).toLocaleDateString('en-AU', { day: 'numeric', month: 'short', timeZone: 'Australia/Sydney' });
}
function fmtTime(iso) {
  return new Date(iso).toLocaleTimeString('en-AU', { hour: 'numeric', minute: '2-digit', hour12: true, timeZone: 'Australia/Sydney' })
          .replace(' am', 'am').replace(' pm', 'pm');
}

function rowId(match) {
  return 'match-' + match.id;
}

function scoreClass(match) {
  const lcHome = isLaneCove(match.home);
  const lc  = Number(lcHome ? match.home.score : match.away.score);
  const opp = Number(lcHome ? match.away.score : match.home.score);
  if (isNaN(lc) || isNaN(opp)) return '';
  return lc > opp ? 'win' : lc < opp ? 'loss' : 'draw';
}

function renderWelcome() {
  return `
    <div class="welcome">
      <h2>Find your team's games</h2>
      <p class="welcome-sub">Venues, kick-off times and results for all Lane Cove JRU teams —<br>updated automatically from the official draw.</p>
      <div class="welcome-cta">↑ Select your team above to get started</div>
      <div class="feature-grid">
        <div class="feature-card">
          <div class="feature-icon">📍</div>
          <div class="feature-title">Live draw</div>
          <div class="feature-desc">Venues, pitch numbers and kick-off times. Updated hourly, with extra checks on game day.</div>
        </div>
        <div class="feature-card">
          <div class="feature-icon">📅</div>
          <div class="feature-title">Calendar sync</div>
          <div class="feature-desc">Add your team's games to Google Calendar or Apple Calendar. Updates automatically when the draw changes.</div>
        </div>
        <div class="feature-card">
          <div class="feature-icon">🔗</div>
          <div class="feature-title">Share your team</div>
          <div class="feature-desc">Every team has a direct link — drop it in your WhatsApp group so parents land straight on their fixtures.</div>
        </div>
      </div>
    </div>`;
}

// ── lineups ───────────────────────────────────────────────────────────────────

async function loadLineups() {
  if (lineupsData) return lineupsData;
  const res = await fetch('lineups.json');
  lineupsData = await res.json();
  return lineupsData;
}

function renderLineupPanel(matchId, entry) {
  const xplorerUrl = `https://xplorer.rugby/lcjru-/match-centre/${matchId}?tab=Player-Lineup`;
  const footer = `<div class="lineup-footer"><a href="${xplorerUrl}" target="_blank" rel="noopener">View full team sheet on Rugby Xplorer ↗</a></div>`;

  if (!entry || (!entry.home.length && !entry.away.length)) {
    return `<div class="lineup-footer">Lineup not yet published — <a href="${xplorerUrl}" target="_blank" rel="noopener">check Rugby Xplorer ↗</a></div>`;
  }

  const col = (players, label) =>
    `<div class="lineup-col"><h4>${label}</h4>` +
    players.map(p => {
      const num  = p.number ?? p.jerseyNumber ?? '';
      const name = p.name ?? [p.firstName, p.lastName].filter(Boolean).join(' ') ?? '';
      return `<div class="lineup-player"><span class="lineup-num">${esc(String(num))}</span><span>${esc(name)}</span></div>`;
    }).join('') +
    `</div>`;

  return col(entry.home, 'Home') + col(entry.away, 'Away') + footer;
}

function attachLineupHandlers() {
  document.querySelectorAll('.row.has-lineup').forEach(row => {
    const matchId = row.dataset.matchId;
    const panel   = document.getElementById(`lineup-${matchId}`);
    if (!panel) return;
    row.addEventListener('click', e => {
      if (e.target.closest('a')) return; // don't intercept venue / anchor link clicks
      const isOpen = panel.classList.contains('open');
      document.querySelectorAll('.lineup-panel.open').forEach(p => p.classList.remove('open'));
      document.querySelectorAll('.row.expanded').forEach(r => r.classList.remove('expanded'));
      if (!isOpen) {
        loadLineups().then(data => {
          panel.innerHTML = renderLineupPanel(matchId, data[matchId]);
          panel.classList.add('open');
          row.classList.add('expanded');
        });
      }
    });
  });
}

// ── rendering ─────────────────────────────────────────────────────────────────

function renderMatch(match, isNextUp) {
  const isDerby       = isLaneCove(match.home) && isLaneCove(match.away);
  const lcTeam        = isLaneCove(match.home) ? match.home : match.away;
  const opponent      = isLaneCove(match.home) ? match.away : match.home;
  const isHome        = match.venue.toLowerCase().includes('tantallon');
  const isResult      = match.type === 'result';
  const isPastFixture = !isResult && new Date(match.dateTime) < new Date();
  const isFinal       = match.round?.includes(String(FINAL_ROUND));

  const roundNum = (match.round || '').replace('Round ', '');
  const badgeCls = isResult      ? 'rnd-badge result'
                 : isPastFixture ? 'rnd-badge past'
                 : isFinal       ? 'rnd-badge final'
                 :                 'rnd-badge';
  const badgeLabel = 'RND';

  const sc = scoreClass(match);
  const resultLabel = { win: 'Win', loss: 'Loss', draw: 'Draw' }[sc] || '';
  const scoreHtml = isResult && match.home.score !== null
    ? `<span class="score-pill ${sc}">${esc(match.home.score)} – ${esc(match.away.score)}</span>${resultLabel ? `<span class="result-badge ${sc}">${resultLabel}</span>` : ''}`
    : '';

  const timeStr = fmtTime(match.dateTime);
  const showTime = timeStr !== '12:00am'; // API sometimes lacks time

  const { display: loc, pitch, mapsUrl } = parseVenue(match.venue ?? '');
  const anchor = rowId(match);

  const showLineup = !match.isBye;
  const lineupAttrs = showLineup ? ` has-lineup" data-match-id="${esc(match.id)}` : ``;

  return `
    <div class="row${isNextUp ? ' next-up' : ''}${lineupAttrs}" id="${esc(anchor)}">
      <a class="row-anchor" href="#${esc(anchor)}" title="Copy link">#</a>
      <div class="${badgeCls}">
        <span>${badgeLabel}</span>
        <span class="num">${esc(roundNum) || '?'}</span>
      </div>
      <div class="date-block">
        <div class="dow">${fmtDow(match.dateTime)}</div>
        <div class="date">${fmtDate(match.dateTime)}</div>
        ${showTime ? `<div class="time">${timeStr}</div>` : ''}
        ${isFinal && !isResult ? '<div class="note final">Final Rnd</div>' : ''}
      </div>
      <div class="venues">
        <div class="venue">
          <span class="team-pill">${esc(shortTeamName(lcTeam.name))}</span>
          <a class="venue-link" href="${mapsUrl}" target="_blank" rel="noopener">${PIN_SVG}<span>${esc(loc)}</span></a>
          ${pitch ? `<span class="pitch-on">on <span class="pitch-tag">${esc(pitch)}</span></span>` : ''}
          ${isHome ? '<span class="home-pill">Home</span>' : ''}
          ${isDerby ? '<span class="derby-pill">Local Derby</span>' : ''}
        </div>
        <div class="venue">
          <span class="opponent">vs ${esc(opponent.name)}</span>
          ${scoreHtml}
        </div>
      </div>
    </div>`;
}

function render(data, teamId) {
  if (!teamId) {
    document.getElementById('calendar').innerHTML = renderWelcome();
    return;
  }

  const now = new Date();
  const matches = data.matches.filter(m => m.home.id === teamId || m.away.id === teamId);

  const past     = [...matches.filter(m => m.type === 'result' || new Date(m.dateTime) < now)].reverse();
  const upcoming =   matches.filter(m => m.type === 'fixture' && new Date(m.dateTime) >= now);

  let html = '';

  if (upcoming.length > 0) {
    html += `<div class="section-header">Upcoming fixtures</div>`;
    let markedNext = false;
    for (const m of upcoming) {
      const isNext = !markedNext;
      if (isNext) markedNext = true;
      html += renderMatch(m, isNext);
    }
  }

  if (past.length > 0) {
    html += `<div class="section-header">Completed games</div>`;
    for (const m of past) html += renderMatch(m, false);
  }

  if (matches.length === 0) {
    html = `<div class="empty">No matches found for the selected team.</div>`;
  }

  document.getElementById('calendar').innerHTML = html;

  // Insert a lineup panel <div> immediately after each upcoming fixture row
  document.querySelectorAll('.row.has-lineup').forEach(row => {
    const panel = document.createElement('div');
    panel.className = 'lineup-panel';
    panel.id = `lineup-${row.dataset.matchId}`;
    row.insertAdjacentElement('afterend', panel);
  });

  attachLineupHandlers();
}

// ── team selection & URL hash ─────────────────────────────────────────────────

function copyTeamLink() {
  const url = location.href.split('#')[0] + (currentTeam ? '#' + SLUG_BY_ID[currentTeam] : '');
  navigator.clipboard.writeText(url).then(() => {
    const btn = document.getElementById('copy-link-btn');
    btn.textContent = '✓ Copied';
    setTimeout(() => { btn.textContent = '🔗 Copy link'; }, 2000);
  });
}

let currentIcsUrl = '';

function copyIcsUrl() {
  navigator.clipboard.writeText(currentIcsUrl).then(() => {
    const btn = document.getElementById('cal-copy-ics');
    btn.textContent = '✓ Copied';
    setTimeout(() => { btn.textContent = 'Copy ICS link'; }, 2000);
  });
}

function selectTeam(teamId, pushState = true) {
  currentTeam = teamId;

  // Update token active states
  document.querySelectorAll('.token').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.team === teamId);
  });

  // Show/hide clear button, copy link, and calendar subscribe links
  const isAndroid = /Android/i.test(navigator.userAgent);
  document.getElementById('clear-btn').classList.toggle('visible', !!teamId);
  document.getElementById('copy-link-btn').classList.toggle('visible', !!teamId);
  document.getElementById('cal-links').classList.toggle('visible', !!teamId);
  document.getElementById('cal-copy-ics').style.display = isAndroid ? 'none' : '';
  if (teamId) {
    const slug = SLUG_BY_ID[teamId];
    const webcalUrl = `webcal://denishoctor.github.io/lcjru-fixtures/${slug}.ics`;
    currentIcsUrl = `https://denishoctor.github.io/lcjru-fixtures/${slug}.ics`;
    document.getElementById('cal-ical').href = webcalUrl;
    const googleCalEl = document.getElementById('cal-google');
    if (isAndroid) {
      googleCalEl.href = 'https://calendar.google.com/calendar/r/settings/addbyurl';
      googleCalEl.textContent = 'Google Calendar (web)';
      googleCalEl.title = 'Tap Copy ICS link first, then paste into the form that opens';
    } else {
      googleCalEl.href = `https://calendar.google.com/calendar/r?cid=${encodeURIComponent(webcalUrl)}`;
      googleCalEl.textContent = 'Google Calendar';
      googleCalEl.title = '';
    }
  }

  // Update hash (without triggering hashchange listener)
  const slug = teamId ? SLUG_BY_ID[teamId] : '';
  if (pushState) {
    history.pushState(null, '', slug ? '#' + slug : location.href.split('#')[0]);
  }

  if (fixturesData) render(fixturesData, teamId);
}

function readHash() {
  const slug = location.hash.replace('#', '').split('/')[0]; // ignore sub-anchor
  return TEAM_SLUGS[slug] || null;
}

// Token clicks
document.querySelectorAll('.token').forEach(btn => {
  btn.addEventListener('click', () => {
    const id = btn.dataset.team;
    selectTeam(id === currentTeam ? null : id); // toggle off if already selected
  });
});

// Browser back/forward
window.addEventListener('hashchange', () => {
  const teamId = readHash();
  selectTeam(teamId, false);

  // If hash points to a specific match anchor, scroll to it after render
  const anchor = location.hash.replace('#', '');
  if (anchor.startsWith('match-')) {
    requestAnimationFrame(() => {
      document.getElementById(anchor)?.scrollIntoView({ behavior: 'smooth', block: 'center' });
    });
  }
});

// ── init ──────────────────────────────────────────────────────────────────────

async function init() {
  const calendar = document.getElementById('calendar');
  calendar.innerHTML = '<div class="empty">Loading fixtures…</div>';

  let data;
  try {
    const res = await fetch(FIXTURES_URL);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    data = await res.json();
  } catch (err) {
    calendar.innerHTML = `<div class="empty">Could not load fixtures. ${esc(err.message)}</div>`;
    return;
  }

  fixturesData = data;

  const stamp = document.getElementById('updated-stamp');
  const updated = new Date(data.updated);
  const staleHours = (Date.now() - updated.getTime()) / 3600000;
  stamp.textContent = `Updated ${updated.toLocaleDateString('en-AU', {
    day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit', timeZone: 'Australia/Sydney'
  })} AEST`;
  if (staleHours > 1) {
    stamp.textContent += ' ⚠ data may be out of date';
    stamp.style.color = '#b71c1c';
  }

  // Apply team from hash (if any) without pushing history
  const initialTeam = readHash();
  if (initialTeam) {
    selectTeam(initialTeam, false);
  } else {
    render(data, null);
  }

  // Scroll to match anchor if present
  const anchor = location.hash.replace('#', '');
  if (anchor.startsWith('match-')) {
    requestAnimationFrame(() => {
      document.getElementById(anchor)?.scrollIntoView({ behavior: 'smooth', block: 'center' });
    });
  }
}

init();
</script>
