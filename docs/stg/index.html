<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src *; script-src 'self' 'unsafe-inline'; style-src 'unsafe-inline'">
<title>Lane Cove Junior Rugby — Fixtures 2026</title>
<link rel="icon" href="https://digitalshift-assets.sfo2.cdn.digitaloceanspaces.com/pw/bacc8d3f-26ad-40d6-8a7f-e81787bacf96/favicon-1600636355774638552.png">
<style>
  :root {
    --navy: #021444;
    --gold: #F4C842;
    --gold-soft: #F8E08E;
    --cream: #FFF6D6;
    --cream-edge: #F0E2A8;
    --ink: #1A1A1A;
    --muted: #6B6B6B;
    --rule: #E5E5E5;
    --green: #2E7D4F;
  }
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Arial, sans-serif;
    margin: 0; background: #FAFAFA; color: var(--ink);
    -webkit-font-smoothing: antialiased;
  }
  .page { max-width: 900px; margin: 0 auto; background: #fff; box-shadow: 0 4px 24px rgba(0,0,0,.06); }

  /* HEADER */
  .header {
    background: var(--navy); color: #fff;
    padding: 16px 22px;
    display: flex; align-items: center; justify-content: space-between;
    border-bottom: 6px solid var(--gold);
    gap: 14px; flex-wrap: wrap;
  }
  .header-left { display: flex; align-items: center; gap: 14px; min-width: 0; flex: 1 1 auto; }
  .crest { width: 56px; height: 68px; overflow: hidden; flex-shrink: 0; box-shadow: 0 2px 6px rgba(0,0,0,.25); }
  .crest img { width: 100%; height: 100%; object-fit: cover; object-position: center; display: block; }
  .title-block { min-width: 0; }
  .eyebrow { text-transform: uppercase; letter-spacing: 2.5px; font-size: 10.5px; color: var(--gold); font-weight: 600; }
  .title-block h1 { font-size: clamp(22px, 5.4vw, 28px); margin: 2px 0 0; font-weight: 800; letter-spacing: -.5px; line-height: 1.1; }

  .live-pill {
    display: inline-flex; align-items: center; gap: 7px;
    font-size: 11px; font-weight: 700; color: #fff;
    background: rgba(255,255,255,.06);
    border: 1px solid rgba(255,255,255,.18);
    padding: 5px 11px 5px 9px; border-radius: 999px;
    letter-spacing: .3px; line-height: 1; white-space: nowrap;
    flex-shrink: 0;
  }
  .live-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: #4ADE80; flex-shrink: 0;
    box-shadow: 0 0 0 3px rgba(74,222,128,.18);
  }
  .live-sep { color: rgba(255,255,255,.35); }
  .live-stamp { color: #C9D2E8; font-weight: 600; }

  /* TOOLBAR — team token grid + action bar */
  .toolbar {
    padding: 12px 20px;
    background: #FFFDF5;
    border-bottom: 1px solid var(--rule);
  }
  .token-group + .token-group { margin-top: 10px; }
  .token-group-label {
    font-size: 9px; font-weight: 800; text-transform: uppercase;
    letter-spacing: 1.5px; color: var(--muted);
    margin: 0 0 5px 2px;
  }
  .token-grid {
    display: grid;
    grid-template-columns: repeat(8, minmax(0, 1fr));
    gap: 6px;
  }
  .token {
    font-size: 11px; font-weight: 700;
    padding: 5px 8px; border-radius: 20px;
    border: 1.5px solid var(--cream-edge);
    background: var(--cream); color: var(--navy);
    cursor: pointer; user-select: none;
    transition: background .12s, color .12s, border-color .12s;
    white-space: nowrap; line-height: 1.3; text-align: center;
  }
  .token:hover { border-color: var(--navy); }
  .token.active {
    background: var(--navy); color: #fff; border-color: var(--navy);
  }

  /* Action bar — Share / Calendar / Home */
  .action-bar {
    display: flex; gap: 6px; justify-content: flex-end; align-items: center;
    margin-top: 12px; padding-top: 10px;
    border-top: 1px dashed var(--cream-edge);
  }
  .action-bar[hidden] { display: none; }
  .action-btn {
    display: inline-flex; align-items: center; gap: 6px;
    font-family: inherit; font-size: 11px; font-weight: 700;
    color: var(--navy); background: var(--cream);
    border: 1.5px solid var(--cream-edge);
    padding: 6px 11px; border-radius: 20px;
    cursor: pointer; line-height: 1; white-space: nowrap;
    transition: background .12s, border-color .12s, color .12s;
  }
  .action-btn:hover { border-color: var(--navy); }
  .action-btn:focus-visible { outline: 2px solid var(--navy); outline-offset: 2px; }
  .action-btn .action-icon { font-size: 12px; line-height: 1; }
  .action-btn .action-caret { font-size: 9px; opacity: .7; margin-left: 1px; }
  .action-btn-ghost {
    background: transparent; border-color: transparent; color: var(--muted);
  }
  .action-btn-ghost:hover { color: var(--navy); border-color: var(--cream-edge); }

  .action-menu { position: relative; }
  .action-popover {
    position: absolute; top: calc(100% + 6px); right: 0; z-index: 30;
    display: none; flex-direction: column;
    background: #fff; border: 1px solid var(--rule); border-radius: 8px;
    box-shadow: 0 8px 24px rgba(0,0,0,.12);
    padding: 5px; min-width: 200px;
  }
  .action-popover.open { display: flex; }
  .action-popover a,
  .action-popover button {
    display: flex; align-items: center; gap: 8px;
    text-align: left; text-decoration: none;
    font-family: inherit; font-size: 12px; font-weight: 600;
    color: var(--ink); background: transparent;
    border: none; padding: 8px 10px; border-radius: 5px;
    cursor: pointer; line-height: 1.2; white-space: nowrap;
  }
  .action-popover a:hover,
  .action-popover button:hover { background: var(--cream); color: var(--navy); }
  .action-popover-icon { font-size: 13px; line-height: 1; flex-shrink: 0; width: 16px; text-align: center; }


  /* WELCOME SCREEN */
  .welcome {
    padding: 36px 28px 44px;
    text-align: center;
    border-bottom: 1px solid var(--rule);
  }
  .welcome h2 {
    font-size: 21px; font-weight: 800; color: var(--navy);
    margin: 0 0 6px; letter-spacing: -.3px;
  }
  .welcome-sub {
    font-size: 14px; color: var(--muted);
    margin: 0 0 24px; line-height: 1.5;
  }
  .welcome-cta {
    display: inline-block;
    background: var(--gold); color: var(--navy);
    font-size: 13px; font-weight: 800;
    padding: 10px 22px; border-radius: 24px;
    margin-bottom: 36px; letter-spacing: .2px;
  }
  .feature-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
    gap: 12px; text-align: left;
  }
  .feature-card {
    background: var(--cream);
    border: 1px solid var(--cream-edge);
    border-radius: 8px;
    padding: 16px 14px;
  }
  .feature-icon { font-size: 22px; margin-bottom: 8px; line-height: 1; }
  .feature-title {
    font-size: 11px; font-weight: 800; color: var(--navy);
    text-transform: uppercase; letter-spacing: .8px; margin-bottom: 5px;
  }
  .feature-desc { font-size: 12px; color: var(--muted); line-height: 1.55; }

  /* SECTION HEADER */
  .section-header {
    padding: 7px 28px;
    background: #FFFDF5;
    border-top: 4px solid var(--gold);
    border-bottom: 1px solid var(--rule);
    text-transform: uppercase; letter-spacing: 2px;
    font-size: 10px; font-weight: 700; color: var(--navy);
  }

  /* ROW */
  .row {
    display: flex; align-items: center; gap: 14px;
    padding: 10px 28px; min-height: 78px;
    border-bottom: 1px solid var(--rule);
    scroll-margin-top: 8px;
    position: relative;
  }
  .row:last-child { border-bottom: none; }
  .row.next-up { background: #FFFFF0; }

  /* Anchor link on each row — desktop hover only; hidden from touch/tap flow */
  .row-anchor {
    position: absolute; left: 8px; top: 50%; transform: translateY(-50%);
    font-size: 11px; color: #ccc; text-decoration: none;
    opacity: 0; pointer-events: none; transition: opacity .15s;
    line-height: 1;
  }
  @media (hover: hover) {
    .row:hover .row-anchor { opacity: 1; pointer-events: auto; }
    .row-anchor:hover { color: var(--navy); }
  }
  .row-anchor:focus-visible { opacity: 1; pointer-events: auto; color: var(--navy); }
  .row-anchor.row-anchor-copied { opacity: 1; color: var(--green); font-weight: 700; }

  /* BADGE */
  .rnd-badge {
    width: 50px; height: 50px; border-radius: 50%;
    background: var(--navy); color: #fff;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    flex-shrink: 0; font-size: 8px; text-transform: uppercase; letter-spacing: 1.5px; line-height: 1;
  }
  .rnd-badge .num { font-size: 18px; font-weight: 800; margin-top: 2px; letter-spacing: 0; }
  .rnd-badge.final { background: var(--gold); color: var(--navy); }
  .rnd-badge.result { background: #2e5a1e; }
  .rnd-badge.past { background: #9E9E9E; }
  .rnd-badge.gala { background: #6A1B9A; color: #fff; }
  .rnd-badge.gala.past { background: #9E9E9E; }

  /* DATE/TIME BLOCK */
  .date-block { flex-shrink: 0; width: 74px; line-height: 1.25; }
  .date-block .dow { text-transform: uppercase; letter-spacing: 1.5px; font-size: 10px; color: var(--muted); }
  .date-block .date { font-size: 17px; font-weight: 700; color: var(--ink); }
  .date-block .time { font-size: 11px; font-weight: 600; color: var(--navy); margin-top: 1px; }
  .date-block .note { font-size: 9px; color: #C2185B; text-transform: uppercase; letter-spacing: 1px; font-weight: 700; margin-top: 2px; }
  .date-block .note.final { color: var(--navy); }

  /* VENUES */
  .venues { flex: 1; display: flex; flex-direction: column; gap: 4px; min-width: 0; }
  .venue { display: flex; align-items: center; gap: 7px; font-size: 13px; min-width: 0; overflow: hidden; }
  .team-pill {
    background: var(--cream); border: 1px solid var(--cream-edge);
    color: var(--navy); font-weight: 700; font-size: 10px;
    padding: 2px 8px; border-radius: 3px; letter-spacing: .5px;
    flex-shrink: 0; white-space: nowrap;
  }
  .venue-link {
    color: var(--ink); text-decoration: none;
    display: inline-flex; align-items: center; gap: 3px;
    flex: 0 1 auto; min-width: 0; overflow: hidden;
  }
  .venue-link span {
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    text-decoration: underline; text-decoration-style: dotted; text-decoration-color: #bbb;
  }
  .venue-link:hover { color: var(--navy); }
  .venue-link:hover span { text-decoration-color: var(--navy); }
  .icon-pin { width: 12px; height: 12px; fill: #bbb; flex-shrink: 0; transition: fill .12s; }
  .venue-link:hover .icon-pin { fill: var(--navy); }
  .pitch-on { font-size: 11px; color: var(--muted); white-space: nowrap; }
  .pitch-tag {
    font-size: 10px; font-weight: 700; letter-spacing: .5px; text-transform: uppercase;
    color: var(--muted); background: #F3F4F6;
    border: 1px solid var(--rule); border-radius: 10px;
    padding: 1px 8px;
  }
  .home-pill {
    background: var(--gold); color: var(--navy);
    font-size: 9px; font-weight: 800;
    padding: 2px 7px; border-radius: 3px;
    letter-spacing: 1px; text-transform: uppercase; flex-shrink: 0;
  }
  .derby-pill {
    background: #E0F2F1; color: #00695C;
    font-size: 9px; font-weight: 800;
    padding: 2px 7px; border-radius: 3px;
    letter-spacing: 1px; text-transform: uppercase; flex-shrink: 0;
  }
  .opponent { color: var(--muted); font-size: 12px; }
  .score-pill { font-weight: 800; font-size: 13px; color: var(--ink); white-space: nowrap; }
  .score-pill.win  { color: var(--green); }
  .score-pill.loss { color: #b71c1c; }
  .score-pill.draw { color: var(--muted); }
  .result-badge {
    font-size: 9px; font-weight: 800; text-transform: uppercase;
    letter-spacing: 1px; padding: 2px 6px; border-radius: 3px; flex-shrink: 0;
  }
  .result-badge.win  { background: #E8F5E9; color: var(--green); }
  .result-badge.loss { background: #FFEBEE; color: #b71c1c; }
  .result-badge.draw { background: #F5F5F5; color: var(--muted); }

  .empty { padding: 40px 28px; text-align: center; color: var(--muted); font-size: 14px; }

  .footer-note {
    padding: 12px 28px; text-align: center; font-size: 11px;
    color: var(--muted); background: #FAFAFA; border-top: 1px solid var(--rule);
    letter-spacing: .5px;
  }
  .footer-note a { color: var(--navy); }

  /* ROW EXPAND TOGGLE + PANELS (lineup, venue) */
  .row.has-lineup,
  .row.has-venue-details { cursor: pointer; }
  .row.has-lineup:hover,
  .row.has-venue-details:hover { background: var(--cream); }
  .row.has-lineup:hover .lineup-toggle,
  .row.has-venue-details:hover .lineup-toggle { border-color: var(--navy); }
  .row.expanded { background: var(--cream); }
  .row.expanded .lineup-toggle {
    background: var(--navy); border-color: var(--navy);
  }
  .row.expanded .lineup-toggle svg { stroke: #fff; }

  .lineup-toggle {
    width: 28px; height: 28px; min-width: 28px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    background: var(--cream); border: 1.5px solid var(--cream-edge);
    flex-shrink: 0;
    transition: background .15s, border-color .15s;
  }
  .lineup-toggle svg {
    width: 13px; height: 13px;
    fill: none; stroke: var(--navy); stroke-width: 2.5;
    stroke-linecap: round; stroke-linejoin: round;
    transition: transform .2s ease;
  }
  .row.expanded .lineup-toggle svg { transform: rotate(180deg); }
  .lineup-panel {
    display: none;
    padding: 10px 16px 14px;
    border-bottom: 1px solid var(--rule);
    background: var(--cream);
  }
  .lineup-panel.open {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 0 12px; align-items: start;
  }
  .lineup-col-header h4 {
    display: flex; align-items: center; gap: 10px;
    font-size: 11px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 1px; color: var(--muted);
    margin: 0 0 8px; padding-bottom: 8px; border-bottom: 1px solid var(--cream-edge);
  }
  .lineup-crest {
    width: 40px; height: 40px; object-fit: contain; flex-shrink: 0;
  }
  .lineup-section-head {
    grid-column: 1 / -1;
    font-size: 9px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 1px; color: var(--muted);
    padding: 7px 0 3px; margin-top: 2px; border-top: 1px solid var(--cream-edge);
  }
  .lineup-player { display: flex; gap: 6px; padding: 1px 0; font-size: 13px; min-height: 1lh; }
  .lineup-player.lineup-empty { visibility: hidden; }
  .lineup-num {
    color: var(--muted); min-width: 18px; text-align: right;
    font-variant-numeric: tabular-nums; font-size: 12px; flex-shrink: 0;
  }
  .lineup-none { font-size: 12px; color: var(--muted); font-style: italic; }
  .lineup-captain {
    display: inline-block; font-size: 8px; font-weight: 800;
    background: var(--navy); color: #fff;
    padding: 0 3px; border-radius: 2px; margin-left: 4px;
    vertical-align: middle; letter-spacing: .5px;
  }
  .lineup-coach { font-size: 12px; color: var(--navy); padding: 1px 0; }
  .lineup-coach.lineup-empty { visibility: hidden; }
  .lineup-footer {
    grid-column: 1 / -1; font-size: 11px; color: var(--muted);
    padding-top: 8px; border-top: 1px solid var(--cream-edge); margin-top: 6px;
    display: flex; justify-content: space-between; align-items: center; gap: 12px;
    flex-wrap: wrap;
  }
  .lineup-footer a { color: var(--navy); }
  .lineup-referee { font-size: 11px; color: var(--muted); }
  .lineup-referee strong { color: var(--navy); font-weight: 600; }

  /* PANEL TABS — shown when a row has both lineup + venue details */
  .panel-tabs {
    display: none;
    padding: 8px 16px 0;
    background: var(--cream);
    gap: 4px;
    border-bottom: 1px solid var(--cream-edge);
  }
  .panel-tabs.open { display: flex; }
  .panel-tab {
    border: none;
    background: transparent;
    font-family: inherit; font-size: 11px; font-weight: 700;
    letter-spacing: 1px; text-transform: uppercase;
    color: var(--muted);
    padding: 6px 12px 8px;
    margin-bottom: -1px;
    border-bottom: 2px solid transparent;
    cursor: pointer;
    transition: color .12s, border-color .12s;
  }
  .panel-tab:hover { color: var(--navy); }
  .panel-tab.active {
    color: var(--navy);
    border-bottom-color: var(--navy);
  }

  /* VENUE PANEL */
  .venue-panel {
    display: none;
    padding: 12px 16px 16px;
    border-bottom: 1px solid var(--rule);
    background: var(--cream);
  }
  .venue-panel.open { display: block; }
  .venue-map-link { display: block; line-height: 0; }
  .venue-map {
    width: 100%; max-height: 70vh; object-fit: contain;
    background: #000; border-radius: 4px;
    border: 1px solid var(--cream-edge);
  }
  .venue-map-caption {
    font-size: 11px; color: var(--muted); padding: 6px 2px 10px;
    letter-spacing: .3px;
  }
  .venue-meta {
    display: grid; grid-template-columns: max-content 1fr;
    gap: 6px 14px; margin: 0 0 14px; font-size: 13px; line-height: 1.45;
  }
  .venue-meta dt {
    font-size: 10px; font-weight: 800; text-transform: uppercase;
    letter-spacing: 1px; color: var(--muted); padding-top: 2px;
  }
  .venue-meta dd {
    margin: 0; color: var(--ink);
  }
  .venue-meta dd strong { color: var(--muted); font-weight: 700; font-size: 11px; letter-spacing: .5px; text-transform: uppercase; margin-right: 4px; }
  @media (max-width: 480px) {
    .venue-meta { grid-template-columns: 1fr; gap: 2px 0; }
    .venue-meta dt { padding-top: 8px; }
    .venue-meta dt:first-of-type { padding-top: 0; }
  }

  /* Event details panel content */
  .event-body {
    margin: 0 0 10px; font-size: 13px; line-height: 1.55; color: var(--ink);
  }
  .event-body:last-of-type { margin-bottom: 12px; }
  .event-highlights, .event-steps {
    margin: 0 0 14px; padding-left: 20px;
    font-size: 13px; line-height: 1.55; color: var(--ink);
  }
  .event-highlights li, .event-steps li { margin-bottom: 4px; }
  .event-cta-btn {
    display: inline-block; margin: 4px 0 6px;
    padding: 9px 18px; border-radius: 4px;
    background: var(--navy); color: #fff;
    font-size: 13px; font-weight: 700; letter-spacing: .3px;
    text-decoration: none;
    transition: background .12s;
  }
  .event-cta-btn:hover { background: #0a1f5c; }

  /* EVENTS */
  .event-badge {
    width: 50px; height: 50px; border-radius: 50%;
    background: var(--cream); border: 2px solid var(--cream-edge);
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .event-icon {
    width: 22px; height: 22px; stroke: var(--navy); fill: none;
    stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round;
  }
  .event-badge-img { width: 38px; height: 38px; object-fit: contain; }
  .event-past .event-badge { background: #F5F5F5; border-color: var(--rule); }
  .event-past .event-icon  { stroke: #BDBDBD; }
  .event-past .event-badge-img { filter: grayscale(1); opacity: .55; }
  .event-past .event-title { color: var(--muted); }
  .event-title { font-weight: 700; font-size: 14px; color: var(--ink); }
  .event-note  { font-size: 12px; color: var(--muted); }
  .event-cta   { align-self: flex-start; font-size: 11px; font-weight: 700; color: var(--navy); }
  .status-badge {
    font-size: 9px; font-weight: 800; text-transform: uppercase;
    letter-spacing: 1px; padding: 2px 6px; border-radius: 3px; flex-shrink: 0;
    margin-left: auto;
  }
  .status-confirmed { background: #E8F5E9; color: #2E7D4F; }
  .status-tentative { background: #FFF3E0; color: #E65100; }
  .status-cancelled { background: #FFEBEE; color: #b71c1c; }
  .status-completed { background: #F5F5F5; color: var(--muted); }
  .note-row { min-height: 40px; padding-top: 7px; padding-bottom: 7px; background: #FFFDF5; }
  .note-text { font-size: 12px; color: var(--muted); font-style: italic; flex: 1; margin: 0; }

  @media (max-width: 600px) {
    .header { padding: 12px 16px; gap: 10px; }
    .header-left { gap: 12px; }
    .crest { width: 48px; height: 60px; }
    .live-pill { font-size: 10px; padding: 4px 9px 4px 8px; gap: 6px; }
    .live-dot { width: 6px; height: 6px; }
    .row { padding: 10px 16px; gap: 10px; }
    .toolbar { padding: 10px 14px; }
    .token-grid { grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 5px; }
    .token { padding: 5px 6px; }
    .action-bar { gap: 4px; }
    .action-btn { padding: 6px 9px; flex: 1 1 0; justify-content: center; }
    .action-btn-ghost { flex: 0 0 auto; }
    .action-popover { right: auto; left: 0; min-width: 180px; }
    .section-header, .footer-note { padding-left: 16px; padding-right: 16px; }
    .welcome { padding: 28px 16px 36px; }
    /* keep 2-column on mobile — tighten spacing and sizing */

</style>
</head>

<script src="../config.js"></script>
<script type="module">
import { esc, isLaneCove, shortTeamName, fmtDow, fmtDate, fmtTime, rowId, scoreClass, parseVenue, venueSlug, renderVenueDetails, renderEventDetails } from './render.mjs';

const FIXTURES_URL = '../fixtures.json';

const { TEAM_SLUGS, VENUES, FINAL_ROUND } = window.LCJRU_CONFIG;
const SLUG_BY_ID = Object.fromEntries(Object.entries(TEAM_SLUGS).map(([s,id]) => [id,s]));

let currentTeam  = null;
let fixturesData = null;
let lineupsData  = null;
let eventsData   = null;

const PIN_SVG     = '<svg class="icon-pin" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5S10.62 6.5 12 6.5s2.5 1.12 2.5 2.5S13.38 11.5 12 11.5z"/></svg>';
const CHEVRON_SVG = '<svg viewBox="0 0 24 24" aria-hidden="true"><polyline points="6 9 12 15 18 9"/></svg>';
const CAL_SVG     = '<svg class="event-icon" viewBox="0 0 24 24" aria-hidden="true"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>';

function renderWelcome() {
  return `
    <div class="welcome">
      <h2>Find your team's games</h2>
      <p class="welcome-sub">Venues, kick-off times and results for all Lane Cove JRU teams —<br>updated automatically from the official draw.</p>
      <div class="welcome-cta">↑ Select your team above to get started</div>
      <div class="feature-grid">
        <div class="feature-card">
          <div class="feature-icon">📍</div>
          <div class="feature-title">Live draw</div>
          <div class="feature-desc">Venues, pitch numbers and kick-off times. Updated hourly, with extra checks on game day.</div>
        </div>
        <div class="feature-card">
          <div class="feature-icon">📅</div>
          <div class="feature-title">Calendar sync</div>
          <div class="feature-desc">Add your team's games to Google Calendar or Apple Calendar. Updates automatically when the draw changes.</div>
        </div>
        <div class="feature-card">
          <div class="feature-icon">🔗</div>
          <div class="feature-title">Share your team</div>
          <div class="feature-desc">Every team has a direct link — drop it in your WhatsApp group so parents land straight on their fixtures.</div>
        </div>
      </div>
    </div>`;
}

// ── lineups ───────────────────────────────────────────────────────────────────

function renderLineupPanel(matchId, entry, homeName, awaName, homeCrest, awayCrest) {
  const xplorerUrl = `https://xplorer.rugby/lcjru-/match-centre/${matchId}?tab=Player-Lineup`;

  const pad = (arr, len) => [...arr, ...Array(Math.max(0, len - arr.length)).fill(null)];

  const homeStarters = (entry.home ?? []).filter(p => !p.isSub);
  const awayStarters = (entry.away ?? []).filter(p => !p.isSub);
  const homeSubs     = (entry.home ?? []).filter(p =>  p.isSub);
  const awaySubs     = (entry.away ?? []).filter(p =>  p.isSub);
  const homeCoaches  = entry.homeCoaches ?? [];
  const awayCoaches  = entry.awayCoaches ?? [];

  const playerCell = (p, noneLabel) => {
    if (!p) return noneLabel
      ? `<div class="lineup-player"><span class="lineup-none">${noneLabel}</span></div>`
      : `<div class="lineup-player lineup-empty" aria-hidden="true"></div>`;
    const cap = p.captain ? ' <span class="lineup-captain">C</span>' : '';
    return `<div class="lineup-player"><span class="lineup-num">${esc(String(p.number))}</span><span>${esc(p.name)}${cap}</span></div>`;
  };

  const coachCell = c => c
    ? `<div class="lineup-coach">${esc(c.name)}</div>`
    : `<div class="lineup-coach lineup-empty" aria-hidden="true"></div>`;

  const sectionHead = label => `<div class="lineup-section-head">${label}</div>`;

  let html = '';
  const hdr = (name, crest) => {
    const img = crest ? `<img class="lineup-crest" src="${esc(crest)}" alt="" loading="lazy">` : '';
    return `<div class="lineup-col-header"><h4>${img}${esc(name)}</h4></div>`;
  };
  html += hdr(homeName, homeCrest) + hdr(awaName, awayCrest);

  const homeEmpty = entry.home.length === 0;
  const awayEmpty = entry.away.length === 0;
  const maxStart  = Math.max(homeStarters.length, awayStarters.length, homeEmpty || awayEmpty ? 1 : 0);
  const hStart = pad(homeStarters, maxStart);
  const aStart = pad(awayStarters, maxStart);
  for (let i = 0; i < maxStart; i++) {
    html += playerCell(hStart[i], homeEmpty && i === 0 ? 'Not published' : null);
    html += playerCell(aStart[i], awayEmpty && i === 0 ? 'Not published' : null);
  }

  const maxSubs = Math.max(homeSubs.length, awaySubs.length);
  if (maxSubs > 0) {
    html += sectionHead('Reserves');
    const hSubs = pad(homeSubs, maxSubs);
    const aSubs = pad(awaySubs, maxSubs);
    for (let i = 0; i < maxSubs; i++) {
      html += playerCell(hSubs[i], null) + playerCell(aSubs[i], null);
    }
  }

  const maxCoaches = Math.max(homeCoaches.length, awayCoaches.length);
  if (maxCoaches > 0) {
    html += sectionHead('Coaches');
    const hC = pad(homeCoaches, maxCoaches);
    const aC = pad(awayCoaches, maxCoaches);
    for (let i = 0; i < maxCoaches; i++) {
      html += coachCell(hC[i]) + coachCell(aC[i]);
    }
  }

  const officials = entry.officials ?? [];
  const mainRef   = officials.find(o => o.role === 'Referee');
  const otherRefs = officials.filter(o => o.role !== 'Referee');
  let refereeHtml = '';
  if (mainRef) {
    refereeHtml = `<span class="lineup-referee">Referee: <strong>${esc(mainRef.name)}</strong>`;
    if (otherRefs.length)
      refereeHtml += ` &nbsp;·&nbsp; ${otherRefs.map(r => `${esc(r.role)}: <strong>${esc(r.name)}</strong>`).join(' &nbsp;·&nbsp; ')}`;
    refereeHtml += `</span>`;
  }

  html += `<div class="lineup-footer">${refereeHtml}<a href="${xplorerUrl}" target="_blank" rel="noopener">View on Rugby Xplorer ↗</a></div>`;
  return html;
}

// Asset paths in renderVenueDetails are relative to docs/, so /stg/ pages need '../'.
// promote.mjs rewrites this to '' when copying into production.
const VENUE_ASSET_PREFIX = '../';

// Builds the URL hash for a row's # anchor: '<team-slug>/<row-id>' so deep links keep the
// team selected. Falls back to bare row-id if no team is active (welcome screen).
function rowHash(rowId) {
  const slug = currentTeam ? SLUG_BY_ID[currentTeam] : '';
  return slug ? `${slug}/${rowId}` : rowId;
}

function collapseAll() {
  document.querySelectorAll('.lineup-panel.open, .venue-panel.open, .panel-tabs.open').forEach(p => p.classList.remove('open'));
  document.querySelectorAll('.row.expanded').forEach(r => r.classList.remove('expanded'));
}

// Closes any open row, then opens the panels for `row`. Single-open invariant per page.
// When a row has both a lineup and venue details, only the active tab's panel is shown
// (default 'lineup'); a tab strip lets the user flip between them.
function expandRow(row) {
  collapseAll();
  const matchId = row.dataset.matchId;
  const lineupPanel = document.getElementById(`lineup-${matchId}`);
  const venuePanel  = document.getElementById(`venue-${matchId}`);
  const tabsBar     = document.getElementById(`tabs-${matchId}`);
  const hasLineup = row.classList.contains('has-lineup');
  const hasVenue  = row.classList.contains('has-venue-details');

  // Populate panel content (always — cheap, and lineupsData may have arrived since last open)
  if (venuePanel && hasVenue) {
    const eventId = row.dataset.eventId;
    const event = eventId ? eventsData?.find(e => e.id === eventId) : null;
    const eventHtml = event ? renderEventDetails(event) : '';
    const venueHtml = row.dataset.venueBase
      ? renderVenueDetails(row.dataset.venueBase, VENUES, { assetPrefix: VENUE_ASSET_PREFIX })
      : '';
    venuePanel.innerHTML = eventHtml + venueHtml;
  }
  if (lineupPanel && hasLineup) {
    const entry = lineupsData?.[matchId];
    lineupPanel.innerHTML = renderLineupPanel(
      matchId, entry,
      row.dataset.homeName  ?? '', row.dataset.awayName  ?? '',
      row.dataset.homeCrest ?? '', row.dataset.awayCrest ?? '',
    );
  }

  // Reveal the right panels
  if (hasLineup && hasVenue) {
    const activeTab = row.dataset.activeTab || 'lineup';
    setActiveTab(tabsBar, activeTab);
    tabsBar?.classList.add('open');
    (activeTab === 'lineup' ? lineupPanel : venuePanel)?.classList.add('open');
  } else if (hasLineup) {
    lineupPanel?.classList.add('open');
  } else if (hasVenue) {
    venuePanel?.classList.add('open');
  }
  row.classList.add('expanded');

  // Bring the row + open panel into view (works for click expand and deep-link arrival).
  // requestAnimationFrame waits for layout so the smooth scroll lands on the post-open height.
  requestAnimationFrame(() => row.scrollIntoView({ behavior: 'smooth', block: 'start' }));
}

function setActiveTab(tabsBar, tabName) {
  if (!tabsBar) return;
  tabsBar.querySelectorAll('.panel-tab').forEach(b => {
    b.classList.toggle('active', b.dataset.tab === tabName);
  });
}

function switchTab(row, tabName) {
  const matchId = row.dataset.matchId;
  const tabsBar     = document.getElementById(`tabs-${matchId}`);
  const lineupPanel = document.getElementById(`lineup-${matchId}`);
  const venuePanel  = document.getElementById(`venue-${matchId}`);
  row.dataset.activeTab = tabName;
  setActiveTab(tabsBar, tabName);
  lineupPanel?.classList.toggle('open', tabName === 'lineup');
  venuePanel?.classList.toggle('open', tabName === 'venue');
}

function attachExpandHandlers() {
  document.querySelectorAll('.row.has-lineup, .row.has-venue-details').forEach(row => {
    row.addEventListener('click', e => {
      if (e.target.closest('a')) return;
      if (row.classList.contains('expanded')) {
        collapseAll();
        const slug = currentTeam ? SLUG_BY_ID[currentTeam] : '';
        history.replaceState(null, '', slug ? '#' + slug : location.pathname + location.search);
      } else {
        expandRow(row);
        // Reflect the open state in the URL so refresh / share preserves it.
        history.replaceState(null, '', '#' + rowHash(row.id));
      }
    });
  });
}

// ── events ────────────────────────────────────────────────────────────────────

function eventDt(e) {
  return e.date
    ? new Date(e.time ? `${e.date}T${e.time}:00+10:00` : `${e.date}T12:00:00+10:00`)
    : null;
}

function renderEvent(event) {
  const dt     = eventDt(event);
  const isPast = event.status === 'completed' || event.status === 'cancelled' ||
    (dt && dt < new Date());

  // Only show tentative / cancelled badges; confirmed and completed are implied by context.
  const STATUS_LABELS = { tentative: 'TBC', cancelled: 'Cancelled' };
  const badgeHtml = STATUS_LABELS[event.status]
    ? `<span class="status-badge status-${esc(event.status)}">${STATUS_LABELS[event.status]}</span>`
    : '';

  // Round-variant events render with the same RND badge as real Xplorer matches (greyed out).
  // Gala-variant events use a distinct purple circle to set them apart from regular rounds.
  // Otherwise: optional iconUrl swaps the calendar SVG for a logo (e.g. Waratahs match-up).
  const isRound = event.variant === 'round' && event.xplorerRound;
  const isGala  = event.variant === 'gala';
  let badgeEl;
  if (isGala) {
    const galaLabel = event.galaLabel ?? 'GALA';
    const galaNum   = event.galaNum   ?? '★';
    badgeEl = `<div class="rnd-badge gala${isPast ? ' past' : ''}"><span>${esc(galaLabel)}</span><span class="num">${esc(galaNum)}</span></div>`;
  } else if (isRound) {
    const roundNum = event.xplorerRound.replace('Round ', '');
    badgeEl = `<div class="rnd-badge past"><span>RND</span><span class="num">${esc(roundNum)}</span></div>`;
  } else if (event.iconUrl) {
    badgeEl = `<div class="event-badge"><img class="event-badge-img" src="${esc(event.iconUrl)}" alt="" loading="lazy"></div>`;
  } else {
    badgeEl = `<div class="event-badge">${CAL_SVG}</div>`;
  }

  let venueHtml = '';
  let venueBase = null, venueHasDetails = false;
  if (event.venue) {
    const parsed = parseVenue(event.venue, VENUES);
    venueBase = parsed.base;
    venueHasDetails = parsed.hasDetails;
    const homePill = event.home ? '<span class="home-pill">Home</span>' : '';
    venueHtml = `<div class="venue"><a class="venue-link" href="${esc(parsed.mapsUrl)}" target="_blank" rel="noopener">${PIN_SVG}<span>${esc(parsed.display)}</span></a>${homePill}</div>`;
  }

  const eventHasDetails = !!event.details;
  const hasDetails = eventHasDetails || venueHasDetails;

  // Inline cta only renders when we DON'T have an expanded panel (panel CTA wins).
  const ctaHtml = event.cta && !eventHasDetails
    ? `<a href="${esc(event.cta.url ?? '#')}" class="event-cta" target="_blank" rel="noopener">${esc(event.cta.label)}</a>`
    : '';

  const description = event.description ?? event.note ?? '';

  const anchor = `event-${event.id}`;
  const rowDataId = `event-${event.id}`;
  const detailsAttrs = hasDetails
    ? ` has-venue-details" data-venue-base="${esc(venueBase ?? '')}" data-event-id="${esc(event.id)}`
    : ``;

  return `
    <div class="row event-row${isPast ? ' event-past' : ''}${detailsAttrs}" id="${esc(anchor)}" data-match-id="${esc(rowDataId)}">
      <a class="row-anchor" href="#${esc(rowHash(anchor))}" title="Copy link">#</a>
      ${badgeEl}
      <div class="date-block">
        ${dt ? `<div class="dow">${fmtDow(dt.toISOString())}</div><div class="date">${fmtDate(dt.toISOString())}</div>${event.time ? `<div class="time">${esc(event.time)}</div>` : ''}` : ''}
      </div>
      <div class="venues">
        <div class="venue"><span class="event-title">${esc(event.title)}</span>${badgeHtml}</div>
        ${venueHtml}
        ${description ? `<div class="venue"><span class="event-note">${esc(description)}</span></div>` : ''}
        ${ctaHtml}
      </div>
      ${hasDetails ? `<span class="lineup-toggle" aria-label="Expand row">${CHEVRON_SVG}</span>` : ''}
    </div>`;
}

function renderNote(event) {
  const dt = eventDt(event);
  const isoStr = dt ? dt.toISOString() : '';
  const datePrefix = isoStr ? `<strong>${fmtDow(isoStr)} ${fmtDate(isoStr)}</strong>` : '';
  const title = event.title ?? event.text ?? '';
  const description = event.description ?? '';
  const noteHtml = [datePrefix, esc(title), description ? esc(description) : '']
    .filter(Boolean)
    .join(' · ');
  return `
    <div class="row note-row">
      <p class="note-text">${noteHtml}</p>
    </div>`;
}

// ── rendering ─────────────────────────────────────────────────────────────────

function renderMatch(match, isNextUp) {
  const isDerby       = isLaneCove(match.home) && isLaneCove(match.away);
  const lcTeam        = isLaneCove(match.home) ? match.home : match.away;
  const opponent      = isLaneCove(match.home) ? match.away : match.home;
  const isHome        = match.venue.toLowerCase().includes('tantallon');
  const isResult      = match.type === 'result';
  const isPastFixture = !isResult && new Date(match.dateTime) < new Date();
  const isFinal       = match.round?.includes(String(FINAL_ROUND));

  const roundNum = (match.round || '').replace('Round ', '');
  const badgeCls = isResult      ? 'rnd-badge result'
                 : isPastFixture ? 'rnd-badge past'
                 : isFinal       ? 'rnd-badge final'
                 :                 'rnd-badge';
  const badgeLabel = 'RND';

  const sc = scoreClass(match);
  const resultLabel = { win: 'Win', loss: 'Loss', draw: 'Draw' }[sc] || '';
  const scoreHtml = isResult && match.home.score !== null
    ? `<span class="score-pill ${sc}">${esc(match.home.score)} – ${esc(match.away.score)}</span>${resultLabel ? `<span class="result-badge ${sc}">${resultLabel}</span>` : ''}`
    : '';

  const timeStr = fmtTime(match.dateTime);
  const showTime = timeStr !== '12:00am';

  const { display: loc, pitch, mapsUrl, base: venueBase, hasDetails } = parseVenue(match.venue ?? '', VENUES);
  const anchor = rowId(match);

  const entry     = lineupsData?.[match.id];
  const hasLineup = !match.isBye && entry && (entry.home.length > 0 || entry.away.length > 0);
  const lineupAttrs = hasLineup
    ? ` has-lineup" data-home-name="${esc(match.home.name)}" data-away-name="${esc(match.away.name)}" data-home-crest="${esc(match.home.crest)}" data-away-crest="${esc(match.away.crest)}`
    : ``;
  const venueAttrs = hasDetails
    ? ` has-venue-details" data-venue-base="${esc(venueBase)}`
    : ``;
  const expandable = hasLineup || hasDetails;

  return `
    <div class="row${isNextUp ? ' next-up' : ''}${lineupAttrs}${venueAttrs}" id="${esc(anchor)}" data-match-id="${esc(match.id)}">
      <a class="row-anchor" href="#${esc(rowHash(anchor))}" title="Copy link">#</a>
      <div class="${badgeCls}">
        <span>${badgeLabel}</span>
        <span class="num">${esc(roundNum) || '?'}</span>
      </div>
      <div class="date-block">
        <div class="dow">${fmtDow(match.dateTime)}</div>
        <div class="date">${fmtDate(match.dateTime)}</div>
        ${showTime ? `<div class="time">${timeStr}</div>` : ''}
        ${isFinal && !isResult ? '<div class="note final">Final Rnd</div>' : ''}
      </div>
      <div class="venues">
        <div class="venue">
          <span class="team-pill">${esc(shortTeamName(lcTeam.name))}</span>
          <a class="venue-link" href="${mapsUrl}" target="_blank" rel="noopener">${PIN_SVG}<span>${esc(loc)}</span></a>
          ${pitch ? `<span class="pitch-on">on <span class="pitch-tag">${esc(pitch)}</span></span>` : ''}
          ${isHome ? '<span class="home-pill">Home</span>' : ''}
          ${isDerby ? '<span class="derby-pill">Local Derby</span>' : ''}
        </div>
        <div class="venue">
          <span class="opponent">vs ${esc(opponent.name)}</span>
          ${scoreHtml}
        </div>
      </div>
      ${expandable ? `<span class="lineup-toggle" aria-label="Expand row">${CHEVRON_SVG}</span>` : ''}
    </div>`;
}

function render(data, teamId) {
  if (!teamId) {
    document.getElementById('calendar').innerHTML = renderWelcome();
    return;
  }

  const slug = SLUG_BY_ID[teamId];
  const now  = new Date();
  const matches = data.matches.filter(m => m.home.id === teamId || m.away.id === teamId);

  const teamEvents = (eventsData || []).filter(e => {
    if (!e.teams?.includes('*') && !e.teams?.includes(slug)) return false;
    if (e.xplorerRound) {
      const covered = data.matches.some(m =>
        (m.home.id === teamId || m.away.id === teamId) && m.round === e.xplorerRound
      );
      if (covered) return false;
    }
    return true;
  });

  const upcomingMatches = matches.filter(m => m.type === 'fixture' && new Date(m.dateTime) >= now);
  const pastMatches     = [...matches.filter(m => m.type === 'result' || new Date(m.dateTime) < now)].reverse();

  const upcomingEvents = teamEvents.filter(e => {
    if (e.status === 'cancelled' || e.status === 'completed') return false;
    const dt = eventDt(e);
    return dt ? dt >= now : e.type === 'note';
  });
  const pastEvents = teamEvents.filter(e => {
    if (e.type === 'note') return false;
    const dt = eventDt(e);
    return dt ? dt < now : false;
  });

  const upcomingAll = [
    ...upcomingMatches.map(m => ({ kind: 'match', dt: new Date(m.dateTime), item: m })),
    ...upcomingEvents.map(e => ({ kind: e.type,   dt: eventDt(e) ?? new Date('9999-12-31'), item: e })),
  ].sort((a, b) => a.dt - b.dt);

  const pastAll = [
    ...pastMatches.map(m => ({ kind: 'match', dt: new Date(m.dateTime), item: m })),
    ...pastEvents.map(e => ({ kind: e.type,   dt: eventDt(e),           item: e })),
  ].sort((a, b) => b.dt - a.dt);

  let html = '';

  if (upcomingAll.length > 0) {
    html += `<div class="section-header">Upcoming</div>`;
    let markedNext = false;
    for (const { kind, item } of upcomingAll) {
      if (kind === 'match') {
        const isNext = !markedNext;
        if (isNext) markedNext = true;
        html += renderMatch(item, isNext);
      } else if (kind === 'event') {
        html += renderEvent(item);
      } else if (kind === 'note') {
        html += renderNote(item);
      }
    }
  }

  if (pastAll.length > 0) {
    html += `<div class="section-header">Completed games</div>`;
    for (const { kind, item } of pastAll) {
      if (kind === 'match')      html += renderMatch(item, false);
      else if (kind === 'event') html += renderEvent(item);
    }
  }

  if (upcomingAll.length === 0 && pastAll.length === 0) {
    html = `<div class="empty">No matches found for the selected team.</div>`;
  }

  document.getElementById('calendar').innerHTML = html;

  // Inject panels in reverse desired order (afterend always inserts directly after the row,
  // so the latest insertion ends up first). Final DOM: row → tabs? → lineup? → venue?.
  document.querySelectorAll('.row.has-lineup, .row.has-venue-details').forEach(row => {
    const hasLineup = row.classList.contains('has-lineup');
    const hasVenue  = row.classList.contains('has-venue-details');
    if (hasVenue) {
      const venuePanel = document.createElement('div');
      venuePanel.className = 'venue-panel';
      venuePanel.id = `venue-${row.dataset.matchId}`;
      row.insertAdjacentElement('afterend', venuePanel);
    }
    if (hasLineup) {
      const lineupPanel = document.createElement('div');
      lineupPanel.className = 'lineup-panel';
      lineupPanel.id = `lineup-${row.dataset.matchId}`;
      row.insertAdjacentElement('afterend', lineupPanel);
    }
    if (hasLineup && hasVenue) {
      const tabs = document.createElement('div');
      tabs.className = 'panel-tabs';
      tabs.id = `tabs-${row.dataset.matchId}`;
      tabs.innerHTML =
        '<button class="panel-tab active" data-tab="lineup" type="button">Lineup</button>' +
        '<button class="panel-tab" data-tab="venue" type="button">Venue</button>';
      row.insertAdjacentElement('afterend', tabs);
    }
  });

  attachExpandHandlers();
}

// ── team selection & URL hash ─────────────────────────────────────────────────

function copyTeamLink() {
  // location.href is kept in sync with the open state (team + expanded row) by replaceState,
  // so sharing it always captures whatever the user currently sees.
  const expandedRow = document.querySelector('.row.expanded');
  const teamSlug = currentTeam ? SLUG_BY_ID[currentTeam] : '';
  let hash = '';
  if (expandedRow) hash = '#' + rowHash(expandedRow.id);
  else if (teamSlug) hash = '#' + teamSlug;
  const url = location.href.split('#')[0] + hash;
  navigator.clipboard.writeText(url).then(() => {
    const labelEl = document.querySelector('#copy-link-btn .action-label');
    labelEl.textContent = 'Copied';
    setTimeout(() => { labelEl.textContent = 'Share'; }, 2000);
  });
}

let currentIcsUrl = '';

function copyIcsUrl() {
  navigator.clipboard.writeText(currentIcsUrl).then(() => {
    const labelEl = document.querySelector('#cal-copy-ics .cal-copy-label');
    labelEl.textContent = 'Copied';
    setTimeout(() => { labelEl.textContent = 'Copy ICS link'; }, 2000);
    closeCalPopover();
  });
}

function openCalPopover() {
  document.getElementById('cal-popover').classList.add('open');
  document.getElementById('cal-trigger').setAttribute('aria-expanded', 'true');
}
function closeCalPopover() {
  document.getElementById('cal-popover').classList.remove('open');
  document.getElementById('cal-trigger').setAttribute('aria-expanded', 'false');
}
function toggleCalPopover() {
  if (document.getElementById('cal-popover').classList.contains('open')) closeCalPopover();
  else openCalPopover();
}

function selectTeam(teamId, pushState = true) {
  currentTeam = teamId;

  document.querySelectorAll('.token').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.team === teamId);
  });

  const isAndroid = /Android/i.test(navigator.userAgent);
  const actionBar = document.getElementById('action-bar');
  if (teamId) actionBar.removeAttribute('hidden');
  else { actionBar.setAttribute('hidden', ''); closeCalPopover(); }
  document.getElementById('cal-copy-ics').style.display = isAndroid ? 'none' : '';
  if (teamId) {
    const slug = SLUG_BY_ID[teamId];
    const webcalUrl = `webcal://denishoctor.github.io/lcjru-fixtures/${slug}.ics`;
    currentIcsUrl = `https://denishoctor.github.io/lcjru-fixtures/${slug}.ics`;
    document.getElementById('cal-ical').href = webcalUrl;
    const googleCalEl = document.getElementById('cal-google');
    const googleLabelEl = googleCalEl.querySelector('.cal-google-label');
    if (isAndroid) {
      googleCalEl.href = 'https://calendar.google.com/calendar/r/settings/addbyurl';
      googleLabelEl.textContent = 'Google Calendar (web)';
      googleCalEl.title = 'Tap Copy ICS link first, then paste into the form that opens';
    } else {
      googleCalEl.href = `https://calendar.google.com/calendar/r?cid=${encodeURIComponent(webcalUrl)}`;
      googleLabelEl.textContent = 'Google Calendar';
      googleCalEl.title = '';
    }
  }

  const slug = teamId ? SLUG_BY_ID[teamId] : '';
  if (pushState) {
    history.pushState(null, '', slug ? '#' + slug : location.href.split('#')[0]);
  }

  if (fixturesData) render(fixturesData, teamId);
}

function readHash() {
  const slug = location.hash.replace('#', '').split('/')[0];
  return TEAM_SLUGS[slug] || null;
}

function readHashAnchor() {
  const parts = location.hash.replace('#', '').split('/');
  return parts.length > 1 ? parts.slice(1).join('/') : '';
}

// Scrolls the row with id=rowId into view and opens its panel(s) if expandable.
// Used on initial load and on hashchange so deep links always land on the open state.
// expandRow handles its own scroll; only non-expandable rows need a manual scroll here.
function focusRow(rowId) {
  if (!rowId) return;
  const row = document.getElementById(rowId);
  if (!row) return;
  const isExpandable = row.classList.contains('has-lineup') || row.classList.contains('has-venue-details');
  if (isExpandable && !row.classList.contains('expanded')) {
    expandRow(row);
  } else {
    row.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }
}

document.querySelectorAll('.token').forEach(btn => {
  btn.addEventListener('click', () => {
    const id = btn.dataset.team;
    selectTeam(id === currentTeam ? null : id);
  });
});

document.getElementById('copy-link-btn').addEventListener('click', copyTeamLink);
document.getElementById('cal-copy-ics').addEventListener('click', copyIcsUrl);
document.getElementById('clear-btn').addEventListener('click', () => selectTeam(null));

document.getElementById('cal-trigger').addEventListener('click', (e) => {
  e.stopPropagation();
  toggleCalPopover();
});
document.getElementById('cal-ical').addEventListener('click', () => closeCalPopover());
document.getElementById('cal-google').addEventListener('click', () => closeCalPopover());
document.addEventListener('click', (e) => {
  const popover = document.getElementById('cal-popover');
  if (!popover.classList.contains('open')) return;
  if (!e.target.closest('#cal-popover') && !e.target.closest('#cal-trigger')) {
    closeCalPopover();
  }
});
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closeCalPopover();
});

// Delegated calendar click handler: covers row '#' anchors and panel tabs. Survives every
// render() rebuild because it's bound once on the calendar container.
document.getElementById('calendar').addEventListener('click', (e) => {
  // Tab click — switch which panel is shown, no scroll, no URL change.
  const tabBtn = e.target.closest('.panel-tab');
  if (tabBtn) {
    const tabsBar = tabBtn.closest('.panel-tabs');
    const matchId = tabsBar?.id.replace('tabs-', '');
    const row = matchId ? document.querySelector(`.row[data-match-id="${matchId}"]`) : null;
    if (row) switchTab(row, tabBtn.dataset.tab);
    return;
  }

  // Row '#' anchor — copy the deep link, expand the row so the sender's view matches what the
  // recipient will land on, flash a tick for feedback.
  const a = e.target.closest('.row-anchor');
  if (!a) return;
  e.preventDefault();
  const row = a.closest('.row');
  if (!row) return;
  const url = location.href.split('#')[0] + '#' + rowHash(row.id);
  const flash = () => {
    const original = a.textContent;
    a.textContent = '✓';
    a.classList.add('row-anchor-copied');
    setTimeout(() => {
      a.textContent = original;
      a.classList.remove('row-anchor-copied');
    }, 1500);
  };
  if (navigator.clipboard?.writeText) {
    navigator.clipboard.writeText(url).then(flash, flash);
  } else {
    flash();
  }
  const canExpand = row.classList.contains('has-lineup') || row.classList.contains('has-venue-details');
  if (canExpand && !row.classList.contains('expanded')) {
    expandRow(row);
  }
  history.replaceState(null, '', '#' + rowHash(row.id));
});

window.addEventListener('hashchange', () => {
  const teamId = readHash();
  selectTeam(teamId, false);
  requestAnimationFrame(() => focusRow(readHashAnchor()));
});

// ── init ──────────────────────────────────────────────────────────────────────

async function init() {
  const calendar = document.getElementById('calendar');
  calendar.innerHTML = '<div class="empty">Loading fixtures…</div>';

  let data;
  try {
    const [fixturesRes, lineupsRes, eventsRes] = await Promise.allSettled([
      fetch(FIXTURES_URL).then(r => { if (!r.ok) throw new Error(`HTTP ${r.status}`); return r.json(); }),
      fetch('../lineups.json').then(r => r.ok ? r.json() : {}),
      fetch('../events.json').then(r => r.ok ? r.json() : []),
    ]);
    if (fixturesRes.status === 'rejected') throw fixturesRes.reason;
    data        = fixturesRes.value;
    lineupsData = lineupsRes.status === 'fulfilled' ? lineupsRes.value : {};
    eventsData  = eventsRes.status  === 'fulfilled' ? eventsRes.value  : [];
  } catch (err) {
    calendar.innerHTML = `<div class="empty">Could not load fixtures. ${esc(err.message)}</div>`;
    return;
  }

  fixturesData = data;

  const stamp = document.getElementById('updated-stamp');
  const updated = new Date(data.updated);
  const staleHours = (Date.now() - updated.getTime()) / 3600000;
  stamp.textContent = `Updated ${updated.toLocaleDateString('en-AU', {
    day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit', timeZone: 'Australia/Sydney'
  })} AEST`;
  if (staleHours > 4) {
    stamp.textContent += ' · sync may be delayed';
    stamp.style.color = '#F0A030';
  }

  const initialTeam = readHash();
  if (initialTeam) {
    selectTeam(initialTeam, false);
  } else {
    render(data, null);
  }

  requestAnimationFrame(() => focusRow(readHashAnchor()));
}

init();
</script>
