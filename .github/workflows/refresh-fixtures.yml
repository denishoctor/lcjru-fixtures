name: Refresh Fixtures

on:
  schedule:
    # Weekdays Mon–Fri: hourly 8am–6pm AEST
    # 8–9am AEST = 22–23 UTC on the *preceding* day (Sun–Thu)
    - cron: '0 22-23 * * 0,1,2,3,4'
    # 10am–6pm AEST = 0–8 UTC same day (Mon–Fri)
    - cron: '0 0-8 * * 1,2,3,4,5'
    # Weekends Sat–Sun: hourly 5am–6pm AEST
    # 5–9am AEST = 19–23 UTC on the *preceding* day (Fri–Sat)
    - cron: '0 19-23 * * 5,6'
    # 10am–6pm AEST = 0–8 UTC same day (Sat–Sun)
    - cron: '0 0-8 * * 6,0'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch fixtures and diff
        run: node scripts/fetch-fixtures.mjs

      - name: Notify via ntfy.sh if fixtures changed
        if: hashFiles('changes.txt') != ''
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: |
          # changes.txt exists but may be empty (no changes) — only send if non-empty
          if [ -s changes.txt ] && [ -n "$NTFY_TOPIC" ]; then
            curl -s \
              -H "Title: LCJRU Fixture Update" \
              -H "Priority: high" \
              -H "Tags: rugby_football,warning" \
              -H "Content-Type: text/plain; charset=utf-8" \
              --data-binary @changes.txt \
              "https://ntfy.sh/$NTFY_TOPIC"
            echo "✓ Notification sent to ntfy.sh"
          fi

      - name: Commit updated fixtures
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/fixtures.json docs/config.js docs/*.ics
          git diff --cached --quiet || git commit -m "chore: refresh fixtures $(date -u +%Y-%m-%d)"
          git push

      - name: Notify via ntfy.sh on failure
        if: failure() && env.NTFY_TOPIC != ''
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: |
          curl -s \
            -H "Title: LCJRU fetch failed" \
            -H "Priority: high" \
            -H "Tags: warning,x" \
            -H "Content-Type: text/plain; charset=utf-8" \
            --data "Fixture refresh failed. Check https://github.com/${{ github.repository }}/actions" \
            "https://ntfy.sh/$NTFY_TOPIC"
