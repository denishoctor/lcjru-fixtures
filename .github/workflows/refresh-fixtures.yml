name: Refresh Fixtures

on:
  schedule:
    - cron: '0 20 * * *'   # 6am AEST daily        — baseline
    - cron: '0 0 * * *'    # 10am AEST daily        — mid-morning check
    - cron: '0 7 * * 6,0'  # 5pm AEST Sat & Sun     — game-day check
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch fixtures and diff
        run: node scripts/fetch-fixtures.mjs

      - name: Notify via ntfy.sh if fixtures changed
        if: hashFiles('changes.txt') != ''
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: |
          # changes.txt exists but may be empty (no changes) — only send if non-empty
          if [ -s changes.txt ] && [ -n "$NTFY_TOPIC" ]; then
            curl -s \
              -H "Title: LCJRU Fixture Update" \
              -H "Priority: high" \
              -H "Tags: rugby_football,warning" \
              -H "Content-Type: text/plain; charset=utf-8" \
              --data-binary @changes.txt \
              "https://ntfy.sh/$NTFY_TOPIC"
            echo "✓ Notification sent to ntfy.sh"
          fi

      - name: Commit updated fixtures
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/fixtures.json
          git diff --cached --quiet || git commit -m "chore: refresh fixtures $(date -u +%Y-%m-%d)"
          git push
