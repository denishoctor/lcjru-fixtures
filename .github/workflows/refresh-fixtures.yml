name: Refresh Fixtures

on:
  schedule:
    - cron: '0 * * * *'   # every hour on the hour, 24/7
    - cron: '30 * * * *'  # every hour on the half-hour, 24/7
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch fixtures and diff
        run: node scripts/fetch-fixtures.mjs

      - name: Commit updated fixtures
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/fixtures.json docs/config.js docs/*.ics
          git diff --cached --quiet || git commit -m "chore: refresh fixtures $(date -u +%Y-%m-%d)"
          git push

      - name: Notify via ntfy.sh on failure
        if: failure() && env.NTFY_TOPIC != ''
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: |
          curl -s \
            -H "Title: LCJRU fetch failed" \
            -H "Priority: high" \
            -H "Tags: warning,x" \
            -H "Content-Type: text/plain; charset=utf-8" \
            --data "Fixture refresh failed. Check https://github.com/${{ github.repository }}/actions" \
            "https://ntfy.sh/$NTFY_TOPIC"
